<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronouns Makeup Examination - SJC Tech</title>
    <style>
        :root {
            --primary: #1f3a93;
            --secondary: #34495e;
            --correct-dark: #006400; 
            --incorrect-dark: #8B0000; 
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f7;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary);
        }
        .header h1 { color: var(--primary); margin-bottom: 5px; }
        .header h3 { color: var(--secondary); margin-top: 0; font-weight: normal; }
        
        .section-title {
            background-color: var(--primary);
            color: white;
            padding: 12px 15px;
            border-radius: 5px;
            margin-top: 40px;
            margin-bottom: 0px;
        }
        .example-instruction {
            background-color: #fff3cd;
            color: #856404;
            padding: 10px 15px;
            border-left: 5px solid #ffeeba;
            border-radius: 0 0 5px 5px;
            margin-bottom: 20px;
            font-size: 14px;
            font-style: italic;
        }
        
        /* NEW MCQ CARD STYLES */
        .question-card {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .question-text { 
            font-weight: bold; 
            font-size: 16px; 
            margin-bottom: 15px;
        }
        
        .option-label {
            display: flex;
            align-items: center;
            background-color: #f0f2f5;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            font-size: 15px;
        }
        .option-label input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.2);
            cursor: pointer;
        }
        .option-label:hover {
            background-color: #e2e6ea;
        }
        
        /* Instant Feedback Colors */
        .option-label.correct {
            background-color: var(--correct-dark) !important;
            color: white;
            font-weight: bold;
        }
        .option-label.incorrect {
            background-color: var(--incorrect-dark) !important;
            color: white;
            font-weight: bold;
        }
        
        /* Locks the card after selection */
        .question-card.locked {
            pointer-events: none;
        }

        .controls { text-align: center; margin: 40px 0; }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #219150; }
        
        #score-display {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: #e8f8f5;
            border-radius: 8px;
            display: none;
        }

        #error-report {
            display: none;
            margin-top: 40px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            border-top: 5px solid var(--incorrect-dark);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        #error-report h2 { color: var(--incorrect-dark); margin-top: 0; }
        .error-item {
            border-bottom: 2px solid #eee;
            padding: 20px 0;
        }
        .error-item:last-child { border-bottom: none; }
        
        .wrong-ans { 
            background-color: var(--incorrect-dark); 
            color: white; 
            font-weight: bold; 
            padding: 12px; 
            border-radius: 5px;
            margin-bottom: 8px;
            display: block;
        }
        .right-ans { 
            background-color: var(--correct-dark); 
            color: white; 
            font-weight: bold; 
            padding: 12px; 
            border-radius: 5px;
            margin-bottom: 8px;
            display: block;
        }
        
        .reason-text { font-style: italic; color: #333; background: #f0f0f0; padding: 12px; border-radius: 5px; margin-top: 10px; border-left: 4px solid var(--primary); }

        @media print {
            body { background: white; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .controls { display: none; }
            .question-card { box-shadow: none; border: 1px solid #ddd; page-break-inside: avoid; }
            #error-report { display: block !important; page-break-before: always; box-shadow: none; border: 1px solid #ccc; }
            .error-item { page-break-inside: avoid; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Pronouns Makeup Examination</h1>
        <h3>Total Questions: 30 | Focus: Missed Concepts & Review</h3>
    </div>

    <div id="quiz-container"></div>
    
    <div class="controls">
        <button onclick="finishTest()">Finish & Generate Report (PDF)</button>
    </div>

    <div id="score-display">Final Score: <span id="final-score">0</span> / 30</div>
    <div id="error-report"></div>

    <script>
        const quizData = [
            // SECTION 1: PERSONAL PRONOUNS
            { section: "Section 1: Personal Pronouns", example: "Instruction: Click on the correct option to lock in your answer.", q: "1. My brother and ___ went to the park yesterday.", options: ["me", "I", "mine", "myself"], a: "I" },
            { q: "2. The teacher handed the test papers to ___.", options: ["they", "their", "them", "theirs"], a: "them" },
            { q: "3. The dog was hungry, so we fed ___ some chicken.", options: ["it", "its", "they", "he"], a: "it" },
            { q: "4. The manager gave the project to Sarah and ___.", options: ["I", "me", "mine", "my"], a: "me" },
            { q: "5. ___ and my sister are going to the mall.", options: ["Her", "She", "Them", "Us"], a: "She" },

            // SECTION 2: REFLEXIVE PRONOUNS
            { section: "Section 2: Reflexive Pronouns", example: "Instruction: Click on the correct reflexive pronoun to lock in your answer.", q: "6. I baked this chocolate cake all by ___.", options: ["me", "myself", "mine", "yourself"], a: "myself" },
            { q: "7. The kids are old enough to look after ___.", options: ["themself", "theirselves", "themselves", "them"], a: "themselves" },
            { q: "8. The cat washed ___ carefully after eating dinner.", options: ["itself", "themselves", "himself", "herself"], a: "itself" },
            { q: "9. The injured bird couldn't fly by ___.", options: ["itself", "himself", "themselves", "it"], a: "itself" },
            { q: "10. We managed to fix the broken fence all by ___.", options: ["us", "ourselves", "ourself", "themselves"], a: "ourselves" },
            { q: "11. The twins dressed ___ for the Halloween party.", options: ["themself", "theirselves", "themselves", "them"], a: "themselves" },

            // SECTION 3: DEMONSTRATIVE PRONOUNS
            { section: "Section 3: Demonstrative Pronouns", example: "Instruction: Click on the correct demonstrative pronoun to lock in your answer.", q: "12. ___ was a fantastic movie we watched last night.", options: ["This", "That", "These", "Those"], a: "That" },
            { q: "13. Hello, ___ is Mark speaking. Is Sarah available? (On the phone)", options: ["this", "that", "these", "those"], a: "this" },
            { q: "14. Put down the heavy boxes. Let me carry ___.", options: ["this", "that", "these", "those"], a: "these" },
            { q: "15. Out of all the paintings across the room, I want to buy ___.", options: ["this", "that", "these", "those"], a: "that" },
            { q: "16. Look at ___ dark clouds gathering over the mountains.", options: ["this", "that", "these", "those"], a: "those" },
            { q: "17. ___ is my favorite song playing on the radio right now!", options: ["This", "That", "These", "Those"], a: "This" },
            { q: "18. Could you please hand me ___ books over there?", options: ["this", "that", "these", "those"], a: "those" },

            // SECTION 4: INTERROGATIVE & RELATIVE PRONOUNS
            { section: "Section 4: Interrogative & Relative Pronouns", example: "Instruction: Click on the correct interrogative or relative pronoun to lock in your answer.", q: "19. To ___ should I address this formal email?", options: ["who", "whom", "whose", "what"], a: "whom" },
            { q: "20. With ___ are you going to the school dance?", options: ["who", "whom", "whose", "which"], a: "whom" },
            { q: "21. ___ did you invite to the dinner party?", options: ["Which", "Whom", "Whose", "What"], a: "Whom" },
            { q: "22. The musician, ___ I admire greatly, is coming to our city.", options: ["who", "whom", "whose", "which"], a: "whom" },
            { q: "23. He is the only person ___ can solve this difficult puzzle.", options: ["who", "which", "whom", "whose"], a: "who" },
            { q: "24. The team members to ___ the manager spoke were very professional.", options: ["who", "whom", "whose", "that"], a: "whom" },
            { q: "25. ___ should I say is calling?", options: ["Who", "Whom", "Whose", "Which"], a: "Who" },
            { q: "26. The person with ___ I was speaking is the CEO.", options: ["who", "whom", "whose", "that"], a: "whom" },
            { q: "27. ___ do you think will win the tournament?", options: ["Who", "Whom", "Whose", "Which"], a: "Who" },
            { q: "28. For ___ did you bake this delicious pie?", options: ["who", "whom", "whose", "what"], a: "whom" },
            { q: "29. The teacher ___ we all respect is retiring next month.", options: ["who", "whom", "whose", "which"], a: "whom" },
            { q: "30. ___ did the police arrest for the robbery?", options: ["Who", "Whom", "Whose", "What"], a: "Whom" }
        ];

        let score = 0;
        let incorrectLog = [];
        let currentSection = "";
        const container = document.getElementById('quiz-container');
        const answeredQuestions = new Set();

        // Render the Quiz
        quizData.forEach((item, qIndex) => {
            if (item.section) {
                currentSection = item.section;
                const secTitle = document.createElement('h2');
                secTitle.className = 'section-title';
                secTitle.innerText = item.section;
                container.appendChild(secTitle);
                
                const instruction = document.createElement('div');
                instruction.className = 'example-instruction';
                instruction.innerText = item.example;
                container.appendChild(instruction);
            }

            const qCard = document.createElement('div');
            qCard.className = 'question-card';
            qCard.id = `card-${qIndex}`;
            
            let html = `<div class="question-text">${item.q}</div>`;
            
            item.options.forEach((opt, optIndex) => {
                html += `
                    <label class="option-label" id="label-${qIndex}-${optIndex}">
                        <input type="radio" name="q${qIndex}" value="${opt}" onchange="checkAnswer(${qIndex}, '${opt}', '${item.a}', this, '${currentSection}')">
                        ${opt}
                    </label>
                `;
            });

            qCard.innerHTML = html;
            container.appendChild(qCard);
        });

        // Validation Logic triggered on Radio Button Change
        function checkAnswer(qIndex, selectedAns, correctAns, radioInput, section) {
            const card = document.getElementById(`card-${qIndex}`);
            
            // Prevent changing answer if already locked
            if (card.classList.contains('locked')) return;

            // Mark question as answered
            answeredQuestions.add(qIndex);

            // Find the label that contains the clicked radio button
            const label = radioInput.parentElement;

            if (selectedAns.toLowerCase() === correctAns.toLowerCase()) {
                label.classList.add('correct');
                score++;
            } else {
                label.classList.add('incorrect');
                
                // Save to error report log
                incorrectLog.push({
                    q: quizData[qIndex].q,
                    studentAns: selectedAns,
                    correctAns: correctAns,
                    section: section
                });
            }

            // Lock the entire card to prevent changing answers
            card.classList.add('locked');
            
            // Auto-scroll to next question slightly
            const nextCard = document.getElementById(`card-${qIndex + 1}`);
            if (nextCard) {
                setTimeout(() => {
                    nextCard.scrollIntoView({ behavior: "smooth", block: "center" });
                }, 400);
            }
        }

        // Grammar Explanations for Report
        function getExplanation(sectionName) {
            if(sectionName.includes('Personal')) return "Personal pronouns replace specific nouns. Use 'I', 'She', 'He', 'We' for the subject performing the action. Use 'me', 'her', 'him', 'us', 'them' for the object receiving the action.";
            if(sectionName.includes('Reflexive')) return "Reflexive pronouns (ending in -self or -selves) are used when the subject and the object of the verb are the same person/thing.";
            if(sectionName.includes('Demonstrative')) return "'This' and 'These' point to things nearby. 'That' and 'Those' point to things far away.";
            if(sectionName.includes('Interrogative & Relative')) return "'Who' is the subject performing the action (like 'he' or 'she'). 'Whom' is the object receiving the action (like 'him' or 'her'), often used after prepositions like 'to', 'with', or 'for'.";
            return "Review standard pronoun rules for this section.";
        }

        // Finalize Test and Generate PDF Report
        function finishTest() {
            // Check for unanswered questions and treat them as incorrect
            quizData.forEach((item, index) => {
                if (!answeredQuestions.has(index)) {
                    document.getElementById(`card-${index}`).classList.add('locked');
                    incorrectLog.push({
                        q: item.q,
                        studentAns: "(Left Blank)",
                        correctAns: item.a,
                        section: item.section || "General"
                    });
                }
            });

            document.getElementById('score-display').style.display = 'block';
            document.getElementById('final-score').innerText = score;
            
            const reportDiv = document.getElementById('error-report');
            
            if (incorrectLog.length > 0) {
                let html = `<h2>Correction Report</h2><p>Please review the rules below for the answers you got wrong or missed.</p>`;
                
                incorrectLog.forEach((err) => {
                    html += `
                    <div class="error-item">
                        <p class="question-text">${err.q}</p>
                        <div class="wrong-ans">❌ Your Answer: ${err.studentAns}</div>
                        <div class="right-ans">✅ Correct Answer: ${err.correctAns}</div>
                        <p class="reason-text"><strong>Why is it wrong?</strong> ${getExplanation(err.section)}</p>
                    </div>`;
                });
                reportDiv.innerHTML = html;
            } else {
                reportDiv.innerHTML = `<h2 style="color:var(--correct-dark)">Perfect Score! Outstanding Job.</h2>`;
            }
            
            reportDiv.style.display = 'block';
            
            // Allow DOM to update before triggering print
            setTimeout(() => {
                window.print();
            }, 500);
        }
    </script>
</body>
</html>
