<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verbs Grammar Test - SJC Tech</title>
    <style>
        :root {
            --primary: #1f3a93;
            --secondary: #34495e;
            --correct-dark: #006400; 
            --incorrect-dark: #8B0000; 
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f7;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary);
        }
        .header h1 { color: var(--primary); margin-bottom: 5px; }
        .header h3 { color: var(--secondary); margin-top: 0; font-weight: normal; }
        
        .section-title {
            background-color: var(--primary);
            color: white;
            padding: 12px 15px;
            border-radius: 5px;
            margin-top: 40px;
            margin-bottom: 0px;
        }
        .example-instruction {
            background-color: #fff3cd;
            color: #856404;
            padding: 10px 15px;
            border-left: 5px solid #ffeeba;
            border-radius: 0 0 5px 5px;
            margin-bottom: 20px;
            font-size: 14px;
            font-style: italic;
        }
        
        .question-card {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .question-text { 
            font-weight: bold; 
            font-size: 16px; 
            margin-bottom: 15px;
        }
        
        .option-label {
            display: flex;
            align-items: center;
            background-color: #f0f2f5;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            font-size: 15px;
        }
        .option-label input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.2);
            cursor: pointer;
        }
        .option-label:hover {
            background-color: #e2e6ea;
        }
        
        .option-label.correct {
            background-color: var(--correct-dark) !important;
            color: white;
            font-weight: bold;
        }
        .option-label.incorrect {
            background-color: var(--incorrect-dark) !important;
            color: white;
            font-weight: bold;
        }
        
        .question-card.locked {
            pointer-events: none;
        }

        .controls { text-align: center; margin: 40px 0; }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #219150; }
        
        #score-display {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: #e8f8f5;
            border-radius: 8px;
            display: none;
        }

        #error-report {
            display: none;
            margin-top: 40px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            border-top: 5px solid var(--incorrect-dark);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        #error-report h2 { color: var(--incorrect-dark); margin-top: 0; }
        .error-item {
            border-bottom: 2px solid #eee;
            padding: 20px 0;
        }
        .error-item:last-child { border-bottom: none; }
        
        .wrong-ans { 
            background-color: var(--incorrect-dark); 
            color: white; 
            font-weight: bold; 
            padding: 12px; 
            border-radius: 5px;
            margin-bottom: 8px;
            display: block;
        }
        .right-ans { 
            background-color: var(--correct-dark); 
            color: white; 
            font-weight: bold; 
            padding: 12px; 
            border-radius: 5px;
            margin-bottom: 8px;
            display: block;
        }
        
        .reason-text { font-style: italic; color: #333; background: #f0f0f0; padding: 12px; border-radius: 5px; margin-top: 10px; border-left: 4px solid var(--primary); }

        @media print {
            body { background: white; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .controls { display: none; }
            .question-card { box-shadow: none; border: 1px solid #ddd; page-break-inside: avoid; }
            #error-report { display: block !important; page-break-before: always; box-shadow: none; border: 1px solid #ccc; }
            .error-item { page-break-inside: avoid; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Verbs Test</h1>
        <h3>Instructor: Muhammad Shaheer Jamal Chishti</h3>
        <p>Total Questions: 20 | Topics: Transitive/Intransitive & Modals</p>
    </div>

    <div id="quiz-container"></div>
    
    <div class="controls">
        <button onclick="finishTest()">Finish Test & Generate PDF Report</button>
    </div>

    <div id="score-display">Final Score: <span id="final-score">0</span> / 20</div>
    <div id="error-report"></div>

    <script>
        const quizData = [
            // SECTION 1: TRANSITIVE VS INTRANSITIVE
            { section: "Section 1: Transitive vs. Intransitive Verbs", example: "Instruction: Decide if the bold verb is Transitive (has a direct object) or Intransitive (does not have a direct object).", q: "1. Shahroze <strong>kicked</strong> the football.", options: ["Transitive", "Intransitive"], a: "Transitive" },
            { q: "2. The baby <strong>slept</strong> peacefully all night.", options: ["Transitive", "Intransitive"], a: "Intransitive" },
            { q: "3. She <strong>read</strong> a very interesting book.", options: ["Transitive", "Intransitive"], a: "Transitive" },
            { q: "4. The bright sun <strong>shines</strong> in the morning.", options: ["Transitive", "Intransitive"], a: "Intransitive" },
            { q: "5. He <strong>bought</strong> a new laptop yesterday.", options: ["Transitive", "Intransitive"], a: "Transitive" },
            { q: "6. The dog <strong>barked</strong> loudly at the stranger.", options: ["Transitive", "Intransitive"], a: "Intransitive" },
            { q: "7. We <strong>ate</strong> hot pizza for dinner.", options: ["Transitive", "Intransitive"], a: "Transitive" },
            { q: "8. Shahroze <strong>sneezed</strong> loudly during the movie.", options: ["Transitive", "Intransitive"], a: "Intransitive" },
            { q: "9. The teacher <strong>answered</strong> the student's question.", options: ["Transitive", "Intransitive"], a: "Transitive" },
            { q: "10. The little bird <strong>flew</strong> away into the sky.", options: ["Transitive", "Intransitive"], a: "Intransitive" },

            // SECTION 2: MODAL AUXILIARIES
            { section: "Section 2: Modal Auxiliaries", example: "Instruction: Choose the correct modal auxiliary verb to complete the sentence based on the context.", q: "11. You are very sick. You ___ go to see a doctor immediately.", options: ["should", "can", "would"], a: "should" },
            { q: "12. ___ you please pass me the salt?", options: ["Must", "Could", "Should"], a: "Could" },
            { q: "13. Shahroze is very smart; he ___ speak three different languages.", options: ["can", "must", "may"], a: "can" },
            { q: "14. It is raining heavily outside. You ___ take an umbrella with you.", options: ["must", "can", "would"], a: "must" },
            { q: "15. ___ I borrow your pen for a moment, please?", options: ["May", "Must", "Will"], a: "May" },
            { q: "16. I ___ like to order a chicken pizza, please.", options: ["can", "should", "would"], a: "would" },
            { q: "17. You ___ not smoke inside the hospital. It is strictly forbidden.", options: ["must", "might", "could"], a: "must" },
            { q: "18. Look at those dark clouds. It ___ rain later today.", options: ["might", "should", "would"], a: "might" },
            { q: "19. When Shahroze was a child, he ___ run very fast.", options: ["could", "can", "should"], a: "could" },
            { q: "20. We ___ respect our parents and elders.", options: ["would", "should", "can"], a: "should" }
        ];

        let score = 0;
        let incorrectLog = [];
        let currentSection = "";
        const container = document.getElementById('quiz-container');
        const answeredQuestions = new Set();

        // Render the Quiz
        quizData.forEach((item, qIndex) => {
            if (item.section) {
                currentSection = item.section;
                const secTitle = document.createElement('h2');
                secTitle.className = 'section-title';
                secTitle.innerText = item.section;
                container.appendChild(secTitle);
                
                const instruction = document.createElement('div');
                instruction.className = 'example-instruction';
                instruction.innerText = item.example;
                container.appendChild(instruction);
            }

            const qCard = document.createElement('div');
            qCard.className = 'question-card';
            qCard.id = `card-${qIndex}`;
            
            let html = `<div class="question-text">${item.q}</div>`;
            
            item.options.forEach((opt, optIndex) => {
                html += `
                    <label class="option-label" id="label-${qIndex}-${optIndex}">
                        <input type="radio" name="q${qIndex}" value="${opt}" onchange="checkAnswer(${qIndex}, '${opt}', '${item.a}', this, '${currentSection}')">
                        ${opt}
                    </label>
                `;
            });

            qCard.innerHTML = html;
            container.appendChild(qCard);
        });

        // Validation Logic
        function checkAnswer(qIndex, selectedAns, correctAns, radioInput, section) {
            const card = document.getElementById(`card-${qIndex}`);
            
            if (card.classList.contains('locked')) return;

            answeredQuestions.add(qIndex);

            const label = radioInput.parentElement;

            if (selectedAns === correctAns) {
                label.classList.add('correct');
                score++;
            } else {
                label.classList.add('incorrect');
                
                incorrectLog.push({
                    q: quizData[qIndex].q,
                    studentAns: selectedAns,
                    correctAns: correctAns,
                    section: section
                });
            }

            card.classList.add('locked');
            
            const nextCard = document.getElementById(`card-${qIndex + 1}`);
            if (nextCard) {
                setTimeout(() => {
                    nextCard.scrollIntoView({ behavior: "smooth", block: "center" });
                }, 400);
            }
        }

        // Grammar Explanations for Report
        function getExplanation(sectionName) {
            if(sectionName.includes('Transitive')) {
                return "A Transitive verb needs a direct object to receive its action (e.g., He kicked [what?] -> the ball). An Intransitive verb makes sense without an object (e.g., The baby slept).";
            }
            if(sectionName.includes('Modal')) {
                return "Modals change the meaning of the verb. Use 'can/could' for ability, 'must' for strong obligation/rules, 'should' for advice, 'may/might' for possibility or permission, and 'would' for polite requests.";
            }
            return "Review standard verb rules.";
        }

        // Finalize Test
        function finishTest() {
            quizData.forEach((item, index) => {
                if (!answeredQuestions.has(index)) {
                    document.getElementById(`card-${index}`).classList.add('locked');
                    incorrectLog.push({
                        q: item.q,
                        studentAns: "(Left Blank)",
                        correctAns: item.a,
                        section: item.section || "General"
                    });
                }
            });

            document.getElementById('score-display').style.display = 'block';
            document.getElementById('final-score').innerText = score;
            
            const reportDiv = document.getElementById('error-report');
            
            if (incorrectLog.length > 0) {
                let html = `<h2>Correction Report</h2><p>Please review the rules below for the answers you got wrong or missed.</p>`;
                
                incorrectLog.forEach((err) => {
                    html += `
                    <div class="error-item">
                        <p class="question-text">${err.q}</p>
                        <div class="wrong-ans">[X] Your Answer: ${err.studentAns}</div>
                        <div class="right-ans">[+] Correct Answer: ${err.correctAns}</div>
                        <p class="reason-text"><strong>Why is it wrong?</strong> ${getExplanation(err.section)}</p>
                    </div>`;
                });
                reportDiv.innerHTML = html;
            } else {
                reportDiv.innerHTML = `<h2 style="color:var(--correct-dark)">Perfect Score! Outstanding Job.</h2>`;
            }
            
            reportDiv.style.display = 'block';
            
            setTimeout(() => {
                window.print();
            }, 500);
        }
    </script>
</body>
</html>
