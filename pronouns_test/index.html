<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprehensive English Grammar Test: Pronouns</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1, h2 {
            text-align: center;
            color: #2c3e50;
        }
        .quiz-card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .question {
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-label {
            padding: 12px 15px;
            border-radius: 5px;
            background: #e9ecef;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
        }
        .option-label:hover {
            background: #dee2e6;
        }
        input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.2);
            cursor: pointer;
        }
        button {
            display: block;
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            font-weight: bold;
            background: #2c3e50;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 30px;
            margin-bottom: 50px;
            transition: background 0.3s;
        }
        button:hover {
            background: #1a252f;
        }
        
        /* --- Final Report Dark Fill Styles --- */
        .report-card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        /* Dark Green Fill for Correct Answers */
        .correct-fill {
            background-color: #1b5e20; 
            color: #ffffff;
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
            font-weight: bold;
        }
        
        /* Dark Red Fill for Wrong Answers */
        .wrong-fill {
            background-color: #b71c1c; 
            color: #ffffff;
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
            font-weight: bold;
        }

        /* Dark Blue Fill for showing the correct answer when the user is wrong */
        .correct-answer-note {
            background-color: #0d47a1; 
            color: #ffffff;
            padding: 12px 15px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 0.95em;
        }
        
        #results {
            display: none;
        }
        .score-header {
            text-align: center;
            font-size: 1.8em;
            margin-bottom: 30px;
            font-weight: bold;
            color: #2c3e50;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div id="quiz-view">
        <h1>Pronouns Grammar Test</h1>
        <p style="text-align: center;">Select the correct pronoun for each sentence.</p>
        <div id="quiz-container"></div>
        <button onclick="submitQuiz()">Submit Test & View Report</button>
    </div>

    <div id="results">
        <h1>Final Report</h1>
        <div id="score-container" class="score-header"></div>
        <div id="report-container"></div>
        <button onclick="location.reload()">Retake Test</button>
    </div>

    <script>
        // Full array of 50 questions structured for the application
        const questions = [
            // Section 1: Personal Pronouns
            { q: "1. My brother and ___ went to the park yesterday.", options: ["me", "I", "mine", "myself"], answer: 1 },
            { q: "2. The teacher handed the test papers to ___.", options: ["they", "their", "them", "theirs"], answer: 2 },
            { q: "3. ___ are planning to travel to Japan next summer.", options: ["Us", "We", "Our", "Ours"], answer: 1 },
            { q: "4. Please tell ___ that the meeting has been canceled.", options: ["she", "hers", "her", "herself"], answer: 2 },
            { q: "5. The package arrived today. I left ___ on the kitchen counter.", options: ["them", "its", "they", "it"], answer: 3 },
            { q: "6. Sarah is my best friend. ___ always helps me with my homework.", options: ["Her", "She", "They", "He"], answer: 1 },
            { q: "7. The principal wants to speak with you and ___ after class.", options: ["I", "mine", "me", "my"], answer: 2 },
            { q: "8. David forgot his lunch, so I shared my sandwich with ___.", options: ["him", "he", "his", "himself"], answer: 0 },
            { q: "9. Are ___ coming to the birthday party tonight?", options: ["yours", "you", "them", "us"], answer: 1 },
            { q: "10. The dog was hungry, so we fed ___ some chicken.", options: ["it", "its", "they", "he"], answer: 0 },

            // Section 2: Reflexive Pronouns
            { q: "11. I baked this chocolate cake all by ___.", options: ["me", "myself", "mine", "yourself"], answer: 1 },
            { q: "12. The kids are old enough to look after ___.", options: ["themself", "theirselves", "themselves", "them"], answer: 2 },
            { q: "13. He accidentally cut ___ while chopping vegetables.", options: ["himself", "hisself", "him", "itself"], answer: 0 },
            { q: "14. She looked at ___ in the mirror before leaving the house.", options: ["her", "hers", "herself", "themselves"], answer: 2 },
            { q: "15. We built the treehouse entirely by ___.", options: ["ourself", "ourselves", "us", "themselves"], answer: 1 },
            { q: "16. The computer turned ___ off to save power.", options: ["itself", "himself", "itselfs", "it"], answer: 0 },
            { q: "17. John, you need to learn to believe in ___.", options: ["yourselves", "yourself", "himself", "myself"], answer: 1 },
            { q: "18. Children, please behave ___ while the guest teacher is here.", options: ["yourself", "yourselves", "themselves", "ourselves"], answer: 1 },
            { q: "19. The cat washed ___ carefully after eating dinner.", options: ["itself", "themselves", "himself", "herself"], answer: 0 },
            { q: "20. The CEO ___ welcomed the new employees to the company.", options: ["itself", "themselves", "himself", "himselfs"], answer: 2 },

            // Section 3: Demonstrative Pronouns
            { q: "21. ___ is the best meal I have ever eaten! (Holding the food)", options: ["This", "That", "These", "Those"], answer: 0 },
            { q: "22. Look at the birds high up in the sky. ___ are bald eagles.", options: ["This", "That", "These", "Those"], answer: 3 },
            { q: "23. Are ___ your shoes left by the front door? (Pointing far away)", options: ["this", "that", "these", "those"], answer: 3 },
            { q: "24. I love the cookies on this plate. ___ are delicious!", options: ["This", "That", "These", "Those"], answer: 2 },
            { q: "25. ___ was a fantastic movie we watched last night.", options: ["This", "That", "These", "Those"], answer: 1 },
            { q: "26. Hello, ___ is Mark speaking. Is Sarah available? (On the phone)", options: ["this", "that", "these", "those"], answer: 0 },
            { q: "27. Put down the heavy boxes. Let me carry ___.", options: ["this", "that", "these", "those"], answer: 2 },
            { q: "28. Out of all the paintings across the room, I want to buy ___.", options: ["this", "that", "these", "those"], answer: 1 },
            { q: "29. ___ are the rules you must follow while in the classroom.", options: ["This", "That", "These", "Those"], answer: 2 },
            { q: "30. I don't like the red shirt, but I really like ___ over there.", options: ["this", "that", "these", "those"], answer: 1 },

            // Section 4: Interrogative Pronouns
            { q: "31. ___ left the front door open?", options: ["Who", "Whom", "Whose", "Which"], answer: 0 },
            { q: "32. To ___ should I address this formal email?", options: ["who", "whom", "whose", "what"], answer: 1 },
            { q: "33. ___ are you doing this weekend?", options: ["Who", "Which", "What", "Whom"], answer: 2 },
            { q: "34. ___ of these two laptops is the better option?", options: ["Who", "What", "Which", "Whom"], answer: 2 },
            { q: "35. ___ backpack is this sitting on my desk?", options: ["Who", "Whom", "Whose", "What"], answer: 2 },
            { q: "36. With ___ are you going to the school dance?", options: ["who", "whom", "whose", "which"], answer: 1 },
            { q: "37. ___ is the capital city of Australia?", options: ["Who", "What", "Which", "Whom"], answer: 1 },
            { q: "38. I have a red pen and a blue pen. ___ do you prefer?", options: ["What", "Who", "Which", "Whose"], answer: 2 },
            { q: "39. ___ did you invite to the dinner party?", options: ["Which", "Whom", "Whose", "What"], answer: 1 },
            { q: "40. ___ is the name of your new pet dog?", options: ["Who", "Which", "What", "Whom"], answer: 2 },

            // Section 5: Relative Pronouns
            { q: "41. The woman ___ lives next door is a famous scientist.", options: ["which", "who", "whom", "whose"], answer: 1 },
            { q: "42. The book ___ I borrowed from the library is very interesting.", options: ["who", "whom", "whose", "which"], answer: 3 },
            { q: "43. The student ___ project won first prize was very happy.", options: ["who", "whom", "whose", "that"], answer: 2 },
            { q: "44. Is this the exact car ___ you want to buy?", options: ["who", "whom", "that", "whose"], answer: 2 },
            { q: "45. The musician, ___ I admire greatly, is coming to our city.", options: ["who", "whom", "whose", "which"], answer: 1 },
            { q: "46. The dog ___ is barking loudly belongs to my neighbor.", options: ["who", "whom", "whose", "that"], answer: 3 },
            { q: "47. He is the only person ___ can solve this difficult puzzle.", options: ["who", "which", "whom", "whose"], answer: 0 },
            { q: "48. We visited the museum ___ was built hundreds of years ago.", options: ["which", "who", "whom", "whose"], answer: 0 },
            { q: "49. I met a girl ___ mother works as an astronaut.", options: ["who", "whom", "whose", "which"], answer: 2 },
            { q: "50. The team members to ___ the manager spoke were very professional.", options: ["who", "whom", "whose", "that"], answer: 1 }
        ];

        const quizContainer = document.getElementById('quiz-container');

        // Render Quiz Forms
        questions.forEach((q, index) => {
            let optionsHTML = '';
            q.options.forEach((opt, i) => {
                optionsHTML += `
                    <label class="option-label">
                        <input type="radio" name="q${index}" value="${i}"> 
                        ${opt}
                    </label>
                `;
            });

            quizContainer.innerHTML += `
                <div class="quiz-card">
                    <div class="question">${q.q}</div>
                    <div class="options">
                        ${optionsHTML}
                    </div>
                </div>
            `;
        });

        // Generate Report
        function submitQuiz() {
            document.getElementById('quiz-view').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            window.scrollTo(0, 0);

            let score = 0;
            const reportContainer = document.getElementById('report-container');
            reportContainer.innerHTML = '';

            questions.forEach((q, index) => {
                const selectedOption = document.querySelector(`input[name="q${index}"]:checked`);
                const reportCard = document.createElement('div');
                reportCard.className = 'report-card';
                
                // Question Header
                let html = `<div class="question">${q.q}</div>`;

                if (selectedOption) {
                    const selectedValue = parseInt(selectedOption.value);
                    if (selectedValue === q.answer) {
                        score++;
                        // Highlight Entire Field Dark Green
                        html += `<div class="correct-fill">✓ Your Answer: ${q.options[selectedValue]} (Correct)</div>`;
                    } else {
                        // Highlight Entire Field Dark Red
                        html += `<div class="wrong-fill">✗ Your Answer: ${q.options[selectedValue]} (Incorrect)</div>`;
                        html += `<div class="correct-answer-note">The correct answer is: <strong>${q.options[q.answer]}</strong></div>`;
                    }
                } else {
                    html += `<div class="wrong-fill">✗ You left this blank.</div>`;
                    html += `<div class="correct-answer-note">The correct answer is: <strong>${q.options[q.answer]}</strong></div>`;
                }

                reportCard.innerHTML = html;
                reportContainer.appendChild(reportCard);
            });

            const scoreHeader = document.getElementById('score-container');
            let percentage = (score / questions.length) * 100;
            scoreHeader.innerHTML = `You scored ${score} out of ${questions.length} (${percentage}%)`;
        }
    </script>
</body>
</html>
