<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles Grammar Test - SJC Tech</title>
    <style>
        :root {
            --primary: #1f3a93;
            --secondary: #34495e;
            --correct-dark: #006400; 
            --incorrect-dark: #8B0000; 
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f7;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary);
        }
        .header h1 { color: var(--primary); margin-bottom: 5px; }
        .header h3 { color: var(--secondary); margin-top: 0; font-weight: normal; }
        
        .example-instruction {
            background-color: #fff3cd;
            color: #856404;
            padding: 12px 15px;
            border-left: 5px solid #ffeeba;
            border-radius: 5px;
            margin-bottom: 30px;
            font-size: 15px;
            font-style: italic;
            text-align: center;
        }
        
        .question-card {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .question-text { 
            font-weight: bold; 
            font-size: 16px; 
            margin-bottom: 15px;
        }
        
        .option-label {
            display: flex;
            align-items: center;
            background-color: #f0f2f5;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            font-size: 15px;
        }
        .option-label input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.2);
            cursor: pointer;
        }
        .option-label:hover {
            background-color: #e2e6ea;
        }
        
        .option-label.correct {
            background-color: var(--correct-dark) !important;
            color: white;
            font-weight: bold;
        }
        .option-label.incorrect {
            background-color: var(--incorrect-dark) !important;
            color: white;
            font-weight: bold;
        }
        
        .question-card.locked {
            pointer-events: none;
        }

        .controls { text-align: center; margin: 40px 0; }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #219150; }
        
        #score-display {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: #e8f8f5;
            border-radius: 8px;
            display: none;
        }

        #error-report {
            display: none;
            margin-top: 40px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            border-top: 5px solid var(--incorrect-dark);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        #error-report h2 { color: var(--incorrect-dark); margin-top: 0; }
        .error-item {
            border-bottom: 2px solid #eee;
            padding: 20px 0;
        }
        .error-item:last-child { border-bottom: none; }
        
        .wrong-ans { 
            background-color: var(--incorrect-dark); 
            color: white; 
            font-weight: bold; 
            padding: 12px; 
            border-radius: 5px;
            margin-bottom: 8px;
            display: block;
        }
        .right-ans { 
            background-color: var(--correct-dark); 
            color: white; 
            font-weight: bold; 
            padding: 12px; 
            border-radius: 5px;
            margin-bottom: 8px;
            display: block;
        }
        
        .reason-text { font-style: italic; color: #333; background: #f0f0f0; padding: 12px; border-radius: 5px; margin-top: 10px; border-left: 4px solid var(--primary); }

        @media print {
            body { background: white; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .controls { display: none; }
            .question-card { box-shadow: none; border: 1px solid #ddd; page-break-inside: avoid; }
            #error-report { display: block !important; page-break-before: always; box-shadow: none; border: 1px solid #ccc; }
            .error-item { page-break-inside: avoid; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Articles (A, An, The) Grammar Test</h1>
        <h3>Instructor: Muhammad Shaheer Jamal Chishti</h3>
        <p>Total Questions: 30</p>
    </div>

    <div class="example-instruction">
        Instruction: Choose the correct article to complete the sentence.
    </div>

    <div id="quiz-container"></div>
    
    <div class="controls">
        <button onclick="finishTest()">Finish Test & Generate PDF Report</button>
    </div>

    <div id="score-display">Final Score: <span id="final-score">0</span> / 30</div>
    <div id="error-report"></div>

    <script>
        const quizData = [
            // EASY QUESTIONS
            { q: "1. I saw ___ dog running in the park.", options: ["a", "an", "the"], a: "a" },
            { q: "2. She is eating ___ apple.", options: ["a", "an", "the"], a: "an" },
            { q: "3. Look at ___ moon! It is beautiful tonight.", options: ["a", "an", "the"], a: "the" },
            { q: "4. My brother wants to be ___ astronaut.", options: ["a", "an", "the"], a: "an" },
            { q: "5. Can you please pass me ___ salt on the table?", options: ["a", "an", "the"], a: "the" },
            { q: "6. We live in ___ small house.", options: ["a", "an", "the"], a: "a" },
            { q: "7. He is reading ___ book right now.", options: ["a", "an", "the"], a: "a" },
            { q: "8. I ate ___ egg for breakfast.", options: ["a", "an", "the"], a: "an" },
            { q: "9. ___ Earth goes around the sun.", options: ["A", "An", "The"], a: "The" },
            { q: "10. She bought ___ new car yesterday.", options: ["a", "an", "the"], a: "a" },
            { q: "11. I need ___ umbrella because it is raining.", options: ["a", "an", "the"], a: "an" },
            { q: "12. He has ___ brother and two sisters.", options: ["a", "an", "the"], a: "a" },
            { q: "13. What is ___ name of your school?", options: ["a", "an", "the"], a: "the" },
            { q: "14. They stayed at ___ hotel in Paris.", options: ["a", "an", "the"], a: "a" },
            { q: "15. Please close ___ door behind you.", options: ["a", "an", "the"], a: "the" },
            
            // MEDIUM QUESTIONS (Tricky sounds and specific rules)
            { q: "16. It will take me ___ hour to finish my homework.", options: ["a", "an", "the"], a: "an" },
            { q: "17. My cousin is studying at ___ university.", options: ["a", "an", "the"], a: "a" },
            { q: "18. He is ___ honest man.", options: ["a", "an", "the"], a: "an" },
            { q: "19. I love to play ___ piano in the evening.", options: ["a", "an", "the"], a: "the" },
            { q: "20. My uncle is ___ European citizen.", options: ["a", "an", "the"], a: "a" },
            { q: "21. Mount Everest is ___ highest mountain in the world.", options: ["a", "an", "the"], a: "the" },
            { q: "22. We traveled to ___ United Kingdom last year.", options: ["a", "an", "the"], a: "the" },
            { q: "23. I saw ___ one-eyed dog crossing the street.", options: ["a", "an", "the"], a: "a" },
            { q: "24. Water is good for you, but ___ water in this bottle is dirty.", options: ["a", "an", "the"], a: "the" },
            { q: "25. She is ___ best student in our entire class.", options: ["a", "an", "the"], a: "the" },
            { q: "26. Do you have ___ idea what time the meeting starts?", options: ["a", "an", "the"], a: "an" },
            { q: "27. My mother is ___ MP (Member of Parliament).", options: ["a", "an", "the"], a: "an" },
            { q: "28. Let's go to ___ beach this weekend.", options: ["a", "an", "the"], a: "the" },
            { q: "29. Would you like ___ cup of tea?", options: ["a", "an", "the"], a: "a" },
            { q: "30. He is wearing ___ uniform for his new job.", options: ["a", "an", "the"], a: "a" }
        ];

        let score = 0;
        let incorrectLog = [];
        const container = document.getElementById('quiz-container');
        const answeredQuestions = new Set();

        // Render the Quiz
        quizData.forEach((item, qIndex) => {
            const qCard = document.createElement('div');
            qCard.className = 'question-card';
            qCard.id = `card-${qIndex}`;
            
            let html = `<div class="question-text">${item.q}</div>`;
            
            item.options.forEach((opt, optIndex) => {
                html += `
                    <label class="option-label" id="label-${qIndex}-${optIndex}">
                        <input type="radio" name="q${qIndex}" value="${opt}" onchange="checkAnswer(${qIndex}, '${opt}', '${item.a}', this)">
                        ${opt}
                    </label>
                `;
            });

            qCard.innerHTML = html;
            container.appendChild(qCard);
        });

        // Validation Logic
        function checkAnswer(qIndex, selectedAns, correctAns, radioInput) {
            const card = document.getElementById(`card-${qIndex}`);
            
            if (card.classList.contains('locked')) return;

            answeredQuestions.add(qIndex);
            const label = radioInput.parentElement;

            if (selectedAns === correctAns) {
                label.classList.add('correct');
                score++;
            } else {
                label.classList.add('incorrect');
                
                incorrectLog.push({
                    q: quizData[qIndex].q,
                    studentAns: selectedAns,
                    correctAns: correctAns
                });
            }

            card.classList.add('locked');
            
            const nextCard = document.getElementById(`card-${qIndex + 1}`);
            if (nextCard) {
                setTimeout(() => {
                    nextCard.scrollIntoView({ behavior: "smooth", block: "center" });
                }, 400);
            }
        }

        // Explanations for the Report
        function getExplanation() {
            return "Use 'a' before words starting with a consonant SOUND (e.g., a car, a university). Use 'an' before words starting with a vowel SOUND (e.g., an apple, an hour). Use 'the' for specific things, unique objects (the sun), superlatives (the best), or things mentioned before.";
        }

        // Finalize Test
        function finishTest() {
            quizData.forEach((item, index) => {
                if (!answeredQuestions.has(index)) {
                    document.getElementById(`card-${index}`).classList.add('locked');
                    incorrectLog.push({
                        q: item.q,
                        studentAns: "(Left Blank)",
                        correctAns: item.a
                    });
                }
            });

            document.getElementById('score-display').style.display = 'block';
            document.getElementById('final-score').innerText = score;
            
            const reportDiv = document.getElementById('error-report');
            
            if (incorrectLog.length > 0) {
                let html = `<h2>Correction Report</h2><p>Please review the rules below for the answers you got wrong or missed.</p>`;
                
                incorrectLog.forEach((err) => {
                    html += `
                    <div class="error-item">
                        <p class="question-text">${err.q}</p>
                        <div class="wrong-ans">[X] Your Answer: ${err.studentAns}</div>
                        <div class="right-ans">[+] Correct Answer: ${err.correctAns}</div>
                        <p class="reason-text"><strong>Grammar Rule:</strong> ${getExplanation()}</p>
                    </div>`;
                });
                reportDiv.innerHTML = html;
            } else {
                reportDiv.innerHTML = `<h2 style="color:var(--correct-dark)">Perfect Score! Outstanding Job.</h2>`;
            }
            
            reportDiv.style.display = 'block';
            
            setTimeout(() => {
                window.print();
            }, 500);
        }
    </script>
</body>
</html>
