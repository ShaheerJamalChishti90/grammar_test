<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verbs with Prepositions Test - SJC Tech</title>
    <style>
        :root {
            --primary: #1f3a93;
            --secondary: #34495e;
            --correct-dark: #006400; 
            --incorrect-dark: #8B0000; 
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f7;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary);
        }
        .header h1 { color: var(--primary); margin-bottom: 5px; }
        .header h3 { color: var(--secondary); margin-top: 0; font-weight: normal; }
        
        .example-instruction {
            background-color: #fff3cd;
            color: #856404;
            padding: 12px 15px;
            border-left: 5px solid #ffeeba;
            border-radius: 5px;
            margin-bottom: 30px;
            font-size: 15px;
            font-style: italic;
            text-align: center;
        }
        
        .question-card {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .question-text { 
            font-weight: bold; 
            font-size: 16px; 
            margin-bottom: 15px;
        }
        
        .option-label {
            display: flex;
            align-items: center;
            background-color: #f0f2f5;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            font-size: 15px;
        }
        .option-label input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.2);
            cursor: pointer;
        }
        .option-label:hover {
            background-color: #e2e6ea;
        }
        
        .option-label.correct {
            background-color: var(--correct-dark) !important;
            color: white;
            font-weight: bold;
        }
        .option-label.incorrect {
            background-color: var(--incorrect-dark) !important;
            color: white;
            font-weight: bold;
        }
        
        .question-card.locked {
            pointer-events: none;
        }

        .controls { text-align: center; margin: 40px 0; }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #219150; }
        
        #score-display {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: #e8f8f5;
            border-radius: 8px;
            display: none;
        }

        #error-report {
            display: none;
            margin-top: 40px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            border-top: 5px solid var(--incorrect-dark);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        #error-report h2 { color: var(--incorrect-dark); margin-top: 0; }
        .error-item {
            border-bottom: 2px solid #eee;
            padding: 20px 0;
        }
        .error-item:last-child { border-bottom: none; }
        
        .wrong-ans { 
            background-color: var(--incorrect-dark); 
            color: white; 
            font-weight: bold; 
            padding: 12px; 
            border-radius: 5px;
            margin-bottom: 8px;
            display: block;
        }
        .right-ans { 
            background-color: var(--correct-dark); 
            color: white; 
            font-weight: bold; 
            padding: 12px; 
            border-radius: 5px;
            margin-bottom: 8px;
            display: block;
        }
        
        .reason-text { font-style: italic; color: #333; background: #f0f0f0; padding: 12px; border-radius: 5px; margin-top: 10px; border-left: 4px solid var(--primary); }

        @media print {
            body { background: white; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .controls { display: none; }
            .question-card { box-shadow: none; border: 1px solid #ddd; page-break-inside: avoid; }
            #error-report { display: block !important; page-break-before: always; box-shadow: none; border: 1px solid #ccc; }
            .error-item { page-break-inside: avoid; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Verbs with Prepositions (to, at, for, about)</h1>
        <h3>Instructor: Muhammad Shaheer Jamal Chishti</h3>
        <p>Total Questions: 30</p>
    </div>

    <div class="example-instruction">
        Instruction: Choose the correct preposition that pairs with the verb in the sentence.
    </div>

    <div id="quiz-container"></div>
    
    <div class="controls">
        <button onclick="finishTest()">Finish Test & Generate PDF Report</button>
    </div>

    <div id="score-display">Final Score: <span id="final-score">0</span> / 30</div>
    <div id="error-report"></div>

    <script>
        const quizData = [
            { rule: "to", q: "1. She is listening ___ the radio in her room.", options: ["to", "at", "for"], a: "to" },
            { rule: "at", q: "2. Look ___ that beautiful bird on the tree!", options: ["to", "at", "about"], a: "at" },
            { rule: "for", q: "3. I am waiting ___ the school bus.", options: ["to", "for", "about"], a: "for" },
            { rule: "about", q: "4. What are you thinking ___ right now?", options: ["to", "at", "about"], a: "about" },
            { rule: "to", q: "5. This laptop belongs ___ my older brother.", options: ["to", "for", "at"], a: "to" },
            { rule: "for", q: "6. He apologized ___ being late to the meeting.", options: ["to", "for", "about"], a: "for" },
            { rule: "at", q: "7. Please do not shout ___ me. I can hear you.", options: ["to", "at", "for"], a: "at" },
            { rule: "about", q: "8. We talked ___ the upcoming math exam.", options: ["to", "for", "about"], a: "about" },
            { rule: "to", q: "9. Can you explain this grammar rule ___ me?", options: ["to", "at", "for"], a: "to" },
            { rule: "at", q: "10. She smiled ___ the camera for the picture.", options: ["at", "to", "for"], a: "at" },
            { rule: "for", q: "11. He asked the waiter ___ a glass of water.", options: ["to", "for", "about"], a: "for" },
            { rule: "about", q: "12. Don't worry ___ the test, you will do great.", options: ["about", "for", "to"], a: "about" },
            { rule: "to", q: "13. What happened ___ your car? It has a scratch.", options: ["at", "to", "for"], a: "to" },
            { rule: "at", q: "14. Everyone laughed ___ the comedian's funny joke.", options: ["to", "at", "for"], a: "at" },
            { rule: "for", q: "15. I need to pay ___ the groceries at the counter.", options: ["to", "for", "about"], a: "for" },
            { rule: "about", q: "16. They complained ___ the cold weather outside.", options: ["about", "at", "to"], a: "about" },
            { rule: "to", q: "17. Please talk ___ the manager if you have an issue.", options: ["to", "at", "for"], a: "to" },
            { rule: "at", q: "18. Why are you staring ___ me like that?", options: ["to", "at", "about"], a: "at" },
            { rule: "for", q: "19. I am looking ___ my lost keys. Have you seen them?", options: ["for", "at", "to"], a: "for" },
            { rule: "about", q: "20. Have you heard ___ the new software update?", options: ["about", "for", "at"], a: "about" },
            { rule: "to", q: "21. He spoke ___ the audience with great confidence.", options: ["to", "at", "for"], a: "to" },
            { rule: "at", q: "22. She pointed ___ the tall building in the distance.", options: ["at", "to", "for"], a: "at" },
            { rule: "for", q: "23. Are you applying ___ the new cybersecurity job?", options: ["to", "for", "about"], a: "for" },
            { rule: "about", q: "24. I care deeply ___ my family's well-being.", options: ["about", "for", "to"], a: "about" },
            { rule: "for", q: "25. I apologize ___ the mistake I made yesterday.", options: ["to", "for", "about"], a: "for" },
            { rule: "at", q: "26. The dog barked ___ the stranger walking by.", options: ["at", "to", "for"], a: "at" },
            { rule: "for", q: "27. I need to ask you ___ a small favor.", options: ["for", "about", "to"], a: "for" },
            { rule: "about", q: "28. Do you know anything ___ the new transfer student?", options: ["about", "to", "at"], a: "about" },
            { rule: "to", q: "29. Please reply ___ my email as soon as possible.", options: ["to", "at", "for"], a: "to" },
            { rule: "at", q: "30. The angry customer yelled ___ the cashier.", options: ["at", "to", "for"], a: "at" }
        ];

        let score = 0;
        let incorrectLog = [];
        const container = document.getElementById('quiz-container');
        const answeredQuestions = new Set();

        // Render the Quiz
        quizData.forEach((item, qIndex) => {
            const qCard = document.createElement('div');
            qCard.className = 'question-card';
            qCard.id = `card-${qIndex}`;
            
            let html = `<div class="question-text">${item.q}</div>`;
            
            item.options.forEach((opt, optIndex) => {
                html += `
                    <label class="option-label" id="label-${qIndex}-${optIndex}">
                        <input type="radio" name="q${qIndex}" value="${opt}" onchange="checkAnswer(${qIndex}, '${opt}', '${item.a}', this, '${item.rule}')">
                        ${opt}
                    </label>
                `;
            });

            qCard.innerHTML = html;
            container.appendChild(qCard);
        });

        // Validation Logic
        function checkAnswer(qIndex, selectedAns, correctAns, radioInput, rule) {
            const card = document.getElementById(`card-${qIndex}`);
            
            if (card.classList.contains('locked')) return;

            answeredQuestions.add(qIndex);
            const label = radioInput.parentElement;

            if (selectedAns === correctAns) {
                label.classList.add('correct');
                score++;
            } else {
                label.classList.add('incorrect');
                
                incorrectLog.push({
                    q: quizData[qIndex].q,
                    studentAns: selectedAns,
                    correctAns: correctAns,
                    rule: rule
                });
            }

            card.classList.add('locked');
            
            const nextCard = document.getElementById(`card-${qIndex + 1}`);
            if (nextCard) {
                setTimeout(() => {
                    nextCard.scrollIntoView({ behavior: "smooth", block: "center" });
                }, 400);
            }
        }

        // Explanations for the Report
        function getExplanation(rule) {
            switch(rule) {
                case "to": return "Verbs followed by 'to' usually show direction or the receiver of an action (e.g., listen to, speak to, explain to, belong to).";
                case "at": return "Verbs followed by 'at' usually point to a target, direction of gaze, or an aggressive action (e.g., look at, point at, shout at, laugh at).";
                case "for": return "Verbs followed by 'for' usually express purpose, looking for something, or giving a reason (e.g., wait for, look for, ask for, apologize for).";
                case "about": return "Verbs followed by 'about' usually introduce the subject or topic of a thought/conversation (e.g., talk about, think about, worry about).";
                default: return "Review standard verb and preposition pairings.";
            }
        }

        // Finalize Test
        function finishTest() {
            quizData.forEach((item, index) => {
                if (!answeredQuestions.has(index)) {
                    document.getElementById(`card-${index}`).classList.add('locked');
                    incorrectLog.push({
                        q: item.q,
                        studentAns: "(Left Blank)",
                        correctAns: item.a,
                        rule: item.rule
                    });
                }
            });

            document.getElementById('score-display').style.display = 'block';
            document.getElementById('final-score').innerText = score;
            
            const reportDiv = document.getElementById('error-report');
            
            if (incorrectLog.length > 0) {
                let html = `<h2>Correction Report</h2><p>Please review the rules below for the answers you got wrong or missed.</p>`;
                
                incorrectLog.forEach((err) => {
                    html += `
                    <div class="error-item">
                        <p class="question-text">${err.q}</p>
                        <div class="wrong-ans">[X] Your Answer: ${err.studentAns}</div>
                        <div class="right-ans">[+] Correct Answer: ${err.correctAns}</div>
                        <p class="reason-text"><strong>Grammar Rule:</strong> ${getExplanation(err.rule)}</p>
                    </div>`;
                });
                reportDiv.innerHTML = html;
            } else {
                reportDiv.innerHTML = `<h2 style="color:var(--correct-dark)">Perfect Score! Outstanding Job.</h2>`;
            }
            
            reportDiv.style.display = 'block';
            
            setTimeout(() => {
                window.print();
            }, 500);
        }
    </script>
</body>
</html>
