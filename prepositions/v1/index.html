<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prepositions Grammar Test - SJC Tech</title>
    <style>
        :root {
            --primary: #1f3a93;
            --secondary: #34495e;
            --correct-dark: #006400; 
            --incorrect-dark: #8B0000; 
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f7;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary);
        }
        .header h1 { color: var(--primary); margin-bottom: 5px; }
        .header h3 { color: var(--secondary); margin-top: 0; font-weight: normal; }
        
        .section-title {
            background-color: var(--primary);
            color: white;
            padding: 12px 15px;
            border-radius: 5px;
            margin-top: 40px;
            margin-bottom: 0px;
        }
        .example-instruction {
            background-color: #fff3cd;
            color: #856404;
            padding: 10px 15px;
            border-left: 5px solid #ffeeba;
            border-radius: 0 0 5px 5px;
            margin-bottom: 20px;
            font-size: 14px;
            font-style: italic;
        }
        
        .question-card {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .question-text { 
            font-weight: bold; 
            font-size: 16px; 
            margin-bottom: 15px;
        }
        
        .option-label {
            display: flex;
            align-items: center;
            background-color: #f0f2f5;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            font-size: 15px;
        }
        .option-label input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.2);
            cursor: pointer;
        }
        .option-label:hover {
            background-color: #e2e6ea;
        }
        
        .option-label.correct {
            background-color: var(--correct-dark) !important;
            color: white;
            font-weight: bold;
        }
        .option-label.incorrect {
            background-color: var(--incorrect-dark) !important;
            color: white;
            font-weight: bold;
        }
        
        .question-card.locked {
            pointer-events: none;
        }

        .controls { text-align: center; margin: 40px 0; }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #219150; }
        
        #score-display {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: #e8f8f5;
            border-radius: 8px;
            display: none;
        }

        #error-report {
            display: none;
            margin-top: 40px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            border-top: 5px solid var(--incorrect-dark);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        #error-report h2 { color: var(--incorrect-dark); margin-top: 0; }
        .error-item {
            border-bottom: 2px solid #eee;
            padding: 20px 0;
        }
        .error-item:last-child { border-bottom: none; }
        
        .wrong-ans { 
            background-color: var(--incorrect-dark); 
            color: white; 
            font-weight: bold; 
            padding: 12px; 
            border-radius: 5px;
            margin-bottom: 8px;
            display: block;
        }
        .right-ans { 
            background-color: var(--correct-dark); 
            color: white; 
            font-weight: bold; 
            padding: 12px; 
            border-radius: 5px;
            margin-bottom: 8px;
            display: block;
        }
        
        .reason-text { font-style: italic; color: #333; background: #f0f0f0; padding: 12px; border-radius: 5px; margin-top: 10px; border-left: 4px solid var(--primary); }

        @media print {
            body { background: white; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .controls { display: none; }
            .question-card { box-shadow: none; border: 1px solid #ddd; page-break-inside: avoid; }
            #error-report { display: block !important; page-break-before: always; box-shadow: none; border: 1px solid #ccc; }
            .error-item { page-break-inside: avoid; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Prepositions Test</h1>
        <h3>Instructor: Muhammad Shaheer Jamal Chishti</h3>
        <p>Total Questions: 30</p>
    </div>

    <div id="quiz-container"></div>
    
    <div class="controls">
        <button onclick="finishTest()">Finish Test & Generate PDF Report</button>
    </div>

    <div id="score-display">Final Score: <span id="final-score">0</span> / 30</div>
    <div id="error-report"></div>

    <script>
        const quizData = [
            // SECTION 1: PREPOSITIONS OF TIME
            { section: "Section 1: Prepositions of Time (at, in, on)", example: "Instruction: Choose the correct preposition of time.", q: "1. Shahroze goes to sleep ___ night.", options: ["at", "in", "on"], a: "at" },
            { q: "2. Her birthday is ___ July.", options: ["at", "in", "on"], a: "in" },
            { q: "3. We have a meeting ___ Monday morning.", options: ["at", "in", "on"], a: "on" },
            { q: "4. Shahroze always eats his meal ___ lunch.", options: ["at", "in", "on"], a: "at" },
            { q: "5. The train arrives ___ 15:30.", options: ["at", "in", "on"], a: "at" },
            { q: "6. We will travel to Paris ___ 2024.", options: ["at", "in", "on"], a: "in" },
            { q: "7. Shahroze loves to play football ___ the summer.", options: ["at", "in", "on"], a: "in" },
            { q: "8. The new store opens ___ April 6.", options: ["at", "in", "on"], a: "on" },
            { q: "9. Let's meet ___ the afternoon.", options: ["at", "in", "on"], a: "in" },
            { q: "10. They are having a big party ___ their anniversary.", options: ["at", "in", "on"], a: "on" },

            // SECTION 2: PREPOSITIONS OF PLACE
            { section: "Section 2: Prepositions of Place (at, in, on)", example: "Instruction: Choose the correct preposition of place.", q: "11. Shahroze left his keys ___ the table.", options: ["at", "in", "on"], a: "on" },
            { q: "12. There is a lot of space ___ a boat.", options: ["at", "in", "on"], a: "in" },
            { q: "13. I am waiting for Shahroze ___ the crossroads.", options: ["at", "in", "on"], a: "at" },
            { q: "14. The picture is hanging ___ her bedroom wall.", options: ["at", "in", "on"], a: "on" },
            { q: "15. Shahroze lives ___ a small town.", options: ["at", "in", "on"], a: "in" },
            { q: "16. She is sitting ___ the doctor's right now.", options: ["at", "in", "on"], a: "at" },
            { q: "17. Look at the writing ___ the bottom of the page.", options: ["at", "in", "on"], a: "at" },
            { q: "18. Shahroze is relaxing ___ home today.", options: ["at", "in", "on"], a: "at" },
            { q: "19. The cat is sleeping ___ the floor.", options: ["at", "in", "on"], a: "on" },
            { q: "20. They are watching a movie ___ the theater.", options: ["at", "in", "on"], a: "at" },

            // SECTION 3: BASIC PREPOSITIONS
            { section: "Section 3: Basic Prepositions", example: "Instruction: Choose the correct preposition based on physical direction and relationship.", q: "21. The ball rolled ___ the table and fell to the ground.", options: ["off", "onto", "above"], a: "off" },
            { q: "22. Shahroze stood ___ the tree to hide from his friends.", options: ["between", "behind", "through"], a: "behind" },
            { q: "23. The bird flew ___ the open window and into the room.", options: ["through", "across", "against"], a: "through" },
            { q: "24. Shahroze sat ___ his two best friends.", options: ["among", "between", "without"], a: "between" },
            { q: "25. The lost coin was hiding ___ the heavy bed.", options: ["under", "above", "opposite"], a: "under" },
            { q: "26. Do not lean ___ the freshly painted wall!", options: ["against", "with", "near"], a: "against" },
            { q: "27. The store is located just ___ the street.", options: ["across", "through", "inside"], a: "across" },
            { q: "28. Shahroze distributed the sweets ___ all the children.", options: ["between", "among", "onto"], a: "among" },
            { q: "29. The helicopter hovered high ___ the city building.", options: ["above", "up", "on"], a: "above" },
            { q: "30. I cannot solve this difficult math problem ___ your help.", options: ["without", "opposite", "off"], a: "without" }
        ];

        let score = 0;
        let incorrectLog = [];
        let currentSection = "";
        const container = document.getElementById('quiz-container');
        const answeredQuestions = new Set();

        // Render the Quiz
        quizData.forEach((item, qIndex) => {
            if (item.section) {
                currentSection = item.section;
                const secTitle = document.createElement('h2');
                secTitle.className = 'section-title';
                secTitle.innerText = item.section;
                container.appendChild(secTitle);
                
                const instruction = document.createElement('div');
                instruction.className = 'example-instruction';
                instruction.innerText = item.example;
                container.appendChild(instruction);
            }

            const qCard = document.createElement('div');
            qCard.className = 'question-card';
            qCard.id = `card-${qIndex}`;
            
            let html = `<div class="question-text">${item.q}</div>`;
            
            item.options.forEach((opt, optIndex) => {
                html += `
                    <label class="option-label" id="label-${qIndex}-${optIndex}">
                        <input type="radio" name="q${qIndex}" value="${opt}" onchange="checkAnswer(${qIndex}, '${opt}', '${item.a}', this, '${currentSection}')">
                        ${opt}
                    </label>
                `;
            });

            qCard.innerHTML = html;
            container.appendChild(qCard);
        });

        // Validation Logic
        function checkAnswer(qIndex, selectedAns, correctAns, radioInput, section) {
            const card = document.getElementById(`card-${qIndex}`);
            
            if (card.classList.contains('locked')) return;

            answeredQuestions.add(qIndex);

            const label = radioInput.parentElement;

            if (selectedAns === correctAns) {
                label.classList.add('correct');
                score++;
            } else {
                label.classList.add('incorrect');
                
                incorrectLog.push({
                    q: quizData[qIndex].q,
                    studentAns: selectedAns,
                    correctAns: correctAns,
                    section: section
                });
            }

            card.classList.add('locked');
            
            const nextCard = document.getElementById(`card-${qIndex + 1}`);
            if (nextCard) {
                setTimeout(() => {
                    nextCard.scrollIntoView({ behavior: "smooth", block: "center" });
                }, 400);
            }
        }

        // Grammar Explanations for Report
        function getExplanation(sectionName) {
            if(sectionName.includes('Time')) {
                return "Use 'at' for the time of day and expressions like 'at night' or 'at lunch'. Use 'in' for months, years, seasons, and parts of the day (in the morning). Use 'on' for days and dates.";
            }
            if(sectionName.includes('Place')) {
                return "Use 'in' for places that surround us (in a house, in a town). Use 'on' for surfaces that something is touching (on a wall, on the floor). Use 'at' for specific points, special places (at the doctor's, at the theater), or 'at home'.";
            }
            return "Basic prepositions describe the physical relationship, position, or direction in which something is moving relative to other objects.";
        }

        // Finalize Test
        function finishTest() {
            quizData.forEach((item, index) => {
                if (!answeredQuestions.has(index)) {
                    document.getElementById(`card-${index}`).classList.add('locked');
                    incorrectLog.push({
                        q: item.q,
                        studentAns: "(Left Blank)",
                        correctAns: item.a,
                        section: item.section || "General"
                    });
                }
            });

            document.getElementById('score-display').style.display = 'block';
            document.getElementById('final-score').innerText = score;
            
            const reportDiv = document.getElementById('error-report');
            
            if (incorrectLog.length > 0) {
                let html = `<h2>Correction Report</h2><p>Please review the rules below for the answers you got wrong or missed.</p>`;
                
                incorrectLog.forEach((err) => {
                    html += `
                    <div class="error-item">
                        <p class="question-text">${err.q}</p>
                        <div class="wrong-ans">[X] Your Answer: ${err.studentAns}</div>
                        <div class="right-ans">[+] Correct Answer: ${err.correctAns}</div>
                        <p class="reason-text"><strong>Why is it wrong?</strong> ${getExplanation(err.section)}</p>
                    </div>`;
                });
                reportDiv.innerHTML = html;
            } else {
                reportDiv.innerHTML = `<h2 style="color:var(--correct-dark)">Perfect Score! Outstanding Job.</h2>`;
            }
            
            reportDiv.style.display = 'block';
            
            setTimeout(() => {
                window.print();
            }, 500);
        }
    </script>
</body>
</html>
