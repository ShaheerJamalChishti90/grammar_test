<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprehensive Tenses Test - SJC Tech</title>
    <style>
        :root {
            --primary: #1f3a93;
            --secondary: #34495e;
            --correct-dark: #006400; 
            --incorrect-dark: #8B0000; 
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f7;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary);
        }
        .header h1 { color: var(--primary); margin-bottom: 5px; }
        .header h3 { color: var(--secondary); margin-top: 0; font-weight: normal; }
        
        .example-instruction {
            background-color: #fff3cd;
            color: #856404;
            padding: 12px 15px;
            border-left: 5px solid #ffeeba;
            border-radius: 5px;
            margin-bottom: 30px;
            font-size: 15px;
            font-style: italic;
            text-align: center;
        }
        
        .question-card {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .question-text { 
            font-weight: bold; 
            font-size: 16px; 
            margin-bottom: 15px;
        }
        
        .option-label {
            display: flex;
            align-items: center;
            background-color: #f0f2f5;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            font-size: 15px;
        }
        .option-label input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.2);
            cursor: pointer;
        }
        .option-label:hover {
            background-color: #e2e6ea;
        }
        
        .option-label.correct {
            background-color: var(--correct-dark) !important;
            color: white;
            font-weight: bold;
        }
        .option-label.incorrect {
            background-color: var(--incorrect-dark) !important;
            color: white;
            font-weight: bold;
        }
        
        .question-card.locked {
            pointer-events: none;
        }

        .controls { text-align: center; margin: 40px 0; }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #219150; }
        
        #score-display {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: #e8f8f5;
            border-radius: 8px;
            display: none;
        }

        #error-report {
            display: none;
            margin-top: 40px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            border-top: 5px solid var(--incorrect-dark);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        #error-report h2 { color: var(--incorrect-dark); margin-top: 0; }
        .error-item {
            border-bottom: 2px solid #eee;
            padding: 20px 0;
        }
        .error-item:last-child { border-bottom: none; }
        
        .wrong-ans { 
            background-color: var(--incorrect-dark); 
            color: white; 
            font-weight: bold; 
            padding: 12px; 
            border-radius: 5px;
            margin-bottom: 8px;
            display: block;
        }
        .right-ans { 
            background-color: var(--correct-dark); 
            color: white; 
            font-weight: bold; 
            padding: 12px; 
            border-radius: 5px;
            margin-bottom: 8px;
            display: block;
        }
        
        .reason-text { font-style: italic; color: #333; background: #f0f0f0; padding: 12px; border-radius: 5px; margin-top: 10px; border-left: 4px solid var(--primary); }
        .tense-badge { display: inline-block; background: var(--primary); color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-style: normal; font-weight: bold; margin-bottom: 5px; }

        @media print {
            body { background: white; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .controls { display: none; }
            .question-card { box-shadow: none; border: 1px solid #ddd; page-break-inside: avoid; }
            #error-report { display: block !important; page-break-before: always; box-shadow: none; border: 1px solid #ccc; }
            .error-item { page-break-inside: avoid; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Comprehensive English Tenses Test</h1>
        <h3>Instructor: Muhammad Shaheer Jamal Chishti</h3>
        <p>Total Questions: 25</p>
    </div>

    <div class="example-instruction">
        Instruction: Click on the correct verb form to complete the sentence. Your answer will lock in instantly.
    </div>

    <div id="quiz-container"></div>
    
    <div class="controls">
        <button onclick="finishTest()">Finish & Generate Report (PDF)</button>
    </div>

    <div id="score-display">Final Score: <span id="final-score">0</span> / 25</div>
    <div id="error-report"></div>

    <script>
        const quizData = [
            // Present Simple
            { tense: "Present Simple", q: "1. The earth ___ around the sun.", options: ["revolve", "revolves", "is revolving", "has revolved"], a: "revolves" },
            { tense: "Present Simple", q: "2. She rarely ___ coffee in the evening.", options: ["drink", "is drinking", "drinks", "has drunk"], a: "drinks" },
            
            // Present Continuous
            { tense: "Present Continuous", q: "3. Shhh! The baby ___ right now.", options: ["sleeps", "is sleeping", "has slept", "was sleeping"], a: "is sleeping" },
            { tense: "Present Continuous", q: "4. They ___ for their final exams these days.", options: ["study", "have studied", "are studying", "were studying"], a: "are studying" },
            
            // Present Perfect (The extra question is added here)
            { tense: "Present Perfect", q: "5. I ___ my homework, can I go out now?", options: ["finish", "am finishing", "finished", "have finished"], a: "have finished" },
            { tense: "Present Perfect", q: "6. She ___ to Paris three times in her life.", options: ["goes", "went", "has been", "is going"], a: "has been" },
            { tense: "Present Perfect", q: "7. We ___ each other since childhood.", options: ["knew", "have known", "are knowing", "know"], a: "have known" },
            
            // Present Perfect Continuous
            { tense: "Present Perfect Continuous", q: "8. He ___ on this project for six months.", options: ["works", "is working", "has worked", "has been working"], a: "has been working" },
            { tense: "Present Perfect Continuous", q: "9. It ___ all day, the streets are completely flooded.", options: ["rains", "is raining", "has rained", "has been raining"], a: "has been raining" },
            
            // Past Simple
            { tense: "Past Simple", q: "10. They ___ the museum last weekend.", options: ["visit", "visited", "have visited", "were visiting"], a: "visited" },
            { tense: "Past Simple", q: "11. I ___ a terrible headache yesterday.", options: ["have", "had", "was having", "have had"], a: "had" },
            
            // Past Continuous
            { tense: "Past Continuous", q: "12. I ___ deeply when the loud phone rang.", options: ["sleep", "slept", "was sleeping", "have slept"], a: "was sleeping" },
            { tense: "Past Continuous", q: "13. What ___ at 8 PM last night?", options: ["did you do", "were you doing", "have you done", "are you doing"], a: "were you doing" },
            
            // Past Perfect
            { tense: "Past Perfect", q: "14. By the time the police arrived, the thief ___.", options: ["escapes", "escaped", "has escaped", "had escaped"], a: "had escaped" },
            { tense: "Past Perfect", q: "15. She told me she ___ the movie before.", options: ["sees", "saw", "has seen", "had seen"], a: "had seen" },
            
            // Past Perfect Continuous
            { tense: "Past Perfect Continuous", q: "16. They ___ for two hours before the bus finally arrived.", options: ["waited", "were waiting", "had waited", "had been waiting"], a: "had been waiting" },
            { tense: "Past Perfect Continuous", q: "17. He was extremely tired because he ___ all night.", options: ["drove", "was driving", "had driven", "had been driving"], a: "had been driving" },
            
            // Future Simple
            { tense: "Future Simple", q: "18. I think it ___ tomorrow.", options: ["rains", "is raining", "will rain", "will be raining"], a: "will rain" },
            { tense: "Future Simple", q: "19. I promise I ___ your secret to anyone.", options: ["don't tell", "am not telling", "won't tell", "haven't told"], a: "won't tell" },
            
            // Future Continuous
            { tense: "Future Continuous", q: "20. This time tomorrow, I ___ on a beach in Hawaii.", options: ["relax", "will relax", "will be relaxing", "will have relaxed"], a: "will be relaxing" },
            { tense: "Future Continuous", q: "21. Please don't call at 9 PM; we ___ dinner.", options: ["eat", "will eat", "will be eating", "will have eaten"], a: "will be eating" },
            
            // Future Perfect
            { tense: "Future Perfect", q: "22. By next month, she ___ her master's degree.", options: ["completes", "will complete", "will be completing", "will have completed"], a: "will have completed" },
            { tense: "Future Perfect", q: "23. They ___ the bridge by the end of the year.", options: ["build", "will build", "will be building", "will have built"], a: "will have built" },
            
            // Future Perfect Continuous
            { tense: "Future Perfect Continuous", q: "24. By next year, I ___ at this company for a decade.", options: ["work", "will work", "will have worked", "will have been working"], a: "will have been working" },
            { tense: "Future Perfect Continuous", q: "25. By 5 PM, the athletes ___ for three hours.", options: ["run", "will run", "will have run", "will have been running"], a: "will have been running" }
        ];

        let score = 0;
        let incorrectLog = [];
        const container = document.getElementById('quiz-container');
        const answeredQuestions = new Set();

        // Render the Quiz without showing the tense names
        quizData.forEach((item, qIndex) => {
            const qCard = document.createElement('div');
            qCard.className = 'question-card';
            qCard.id = `card-${qIndex}`;
            
            let html = `<div class="question-text">${item.q}</div>`;
            
            item.options.forEach((opt, optIndex) => {
                html += `
                    <label class="option-label" id="label-${qIndex}-${optIndex}">
                        <input type="radio" name="q${qIndex}" value="${opt}" onchange="checkAnswer(${qIndex}, '${opt}', '${item.a}', this, '${item.tense}')">
                        ${opt}
                    </label>
                `;
            });

            qCard.innerHTML = html;
            container.appendChild(qCard);
        });

        // Validation Logic
        function checkAnswer(qIndex, selectedAns, correctAns, radioInput, tense) {
            const card = document.getElementById(`card-${qIndex}`);
            
            if (card.classList.contains('locked')) return;

            answeredQuestions.add(qIndex);
            const label = radioInput.parentElement;

            if (selectedAns === correctAns) {
                label.classList.add('correct');
                score++;
            } else {
                label.classList.add('incorrect');
                
                incorrectLog.push({
                    q: quizData[qIndex].q,
                    studentAns: selectedAns,
                    correctAns: correctAns,
                    tense: tense
                });
            }

            card.classList.add('locked');
            
            const nextCard = document.getElementById(`card-${qIndex + 1}`);
            if (nextCard) {
                setTimeout(() => {
                    nextCard.scrollIntoView({ behavior: "smooth", block: "center" });
                }, 400);
            }
        }

        // Explanations for the Report Based on Tense
        function getExplanation(tenseName) {
            switch(tenseName) {
                case "Present Simple": return "Used for daily habits, universal facts, or routines. Structure: Subject + V1(s/es).";
                case "Present Continuous": return "Used for temporary actions or actions happening right now. Structure: Subject + is/am/are + V1(-ing).";
                case "Present Perfect": return "Used for actions finished at an unspecified time in the past, or past actions that have a result in the present. Structure: Subject + has/have + V3.";
                case "Present Perfect Continuous": return "Used for actions that started in the past and are still happening now (focuses on duration). Structure: Subject + has/have + been + V1(-ing).";
                case "Past Simple": return "Used for finished actions at a specific time in the past. Structure: Subject + V2.";
                case "Past Continuous": return "Used for an action that was in progress at a specific time in the past, or interrupted by another action. Structure: Subject + was/were + V1(-ing).";
                case "Past Perfect": return "Used for the 'past of the past' - an action that happened before another action in the past. Structure: Subject + had + V3.";
                case "Past Perfect Continuous": return "Used to show how long an action was happening in the past before something else interrupted it. Structure: Subject + had + been + V1(-ing).";
                case "Future Simple": return "Used for predictions, promises, or instant decisions about the future. Structure: Subject + will + V1.";
                case "Future Continuous": return "Used for actions that will be in progress at a specific time in the future. Structure: Subject + will + be + V1(-ing).";
                case "Future Perfect": return "Used for actions that will be completed by a certain deadline in the future. Structure: Subject + will + have + V3.";
                case "Future Perfect Continuous": return "Used to show the duration of an action up to a certain point in the future. Structure: Subject + will + have + been + V1(-ing).";
                default: return "Review tense structures.";
            }
        }

        // Finalize Test
        function finishTest() {
            quizData.forEach((item, index) => {
                if (!answeredQuestions.has(index)) {
                    document.getElementById(`card-${index}`).classList.add('locked');
                    incorrectLog.push({
                        q: item.q,
                        studentAns: "(Left Blank)",
                        correctAns: item.a,
                        tense: item.tense
                    });
                }
            });

            document.getElementById('score-display').style.display = 'block';
            document.getElementById('final-score').innerText = score;
            
            const reportDiv = document.getElementById('error-report');
            
            if (incorrectLog.length > 0) {
                let html = `<h2>Correction Report</h2><p>Please review the rules below for the answers you got wrong or missed.</p>`;
                
                incorrectLog.forEach((err) => {
                    html += `
                    <div class="error-item">
                        <span class="tense-badge">Tested Topic: ${err.tense}</span>
                        <p class="question-text">${err.q}</p>
                        <div class="wrong-ans">[X] Your Answer: ${err.studentAns}</div>
                        <div class="right-ans">[✓] Correct Answer: ${err.correctAns}</div>
                        <p class="reason-text"><strong>Grammar Rule:</strong> ${getExplanation(err.tense)}</p>
                    </div>`;
                });
                reportDiv.innerHTML = html;
            } else {
                reportDiv.innerHTML = `<h2 style="color:var(--correct-dark)">Perfect Score! Outstanding Job.</h2>`;
            }
            
            reportDiv.style.display = 'block';
            
            setTimeout(() => {
                window.print();
            }, 500);
        }
    </script>
</body>
</html>
