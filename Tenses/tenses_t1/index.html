<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Tenses Grammar Test - SJC Tech</title>
    <style>
        :root {
            --primary: #1f3a93;
            --secondary: #34495e;
            --correct-dark: #006400; 
            --incorrect-dark: #8B0000; 
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f7;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary);
        }
        .header h1 { color: var(--primary); margin-bottom: 5px; }
        .header h3 { color: var(--secondary); margin-top: 0; font-weight: normal; }
        
        .example-instruction {
            background-color: #fff3cd;
            color: #856404;
            padding: 12px 15px;
            border-left: 5px solid #ffeeba;
            border-radius: 5px;
            margin-bottom: 30px;
            font-size: 15px;
            font-style: italic;
            text-align: center;
        }
        
        .question-card {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .question-text { 
            font-weight: bold; 
            font-size: 16px; 
            margin-bottom: 15px;
        }
        
        .option-label {
            display: flex;
            align-items: center;
            background-color: #f0f2f5;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            font-size: 15px;
        }
        .option-label input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.2);
            cursor: pointer;
        }
        .option-label:hover {
            background-color: #e2e6ea;
        }
        
        .option-label.correct {
            background-color: var(--correct-dark) !important;
            color: white;
            font-weight: bold;
        }
        .option-label.incorrect {
            background-color: var(--incorrect-dark) !important;
            color: white;
            font-weight: bold;
        }
        
        .question-card.locked {
            pointer-events: none;
        }

        .controls { text-align: center; margin: 40px 0; }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #219150; }
        
        #score-display {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: #e8f8f5;
            border-radius: 8px;
            display: none;
        }

        #error-report {
            display: none;
            margin-top: 40px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            border-top: 5px solid var(--incorrect-dark);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        #error-report h2 { color: var(--incorrect-dark); margin-top: 0; }
        .error-item {
            border-bottom: 2px solid #eee;
            padding: 20px 0;
        }
        .error-item:last-child { border-bottom: none; }
        
        .wrong-ans { 
            background-color: var(--incorrect-dark); 
            color: white; 
            font-weight: bold; 
            padding: 12px; 
            border-radius: 5px;
            margin-bottom: 8px;
            display: block;
        }
        .right-ans { 
            background-color: var(--correct-dark); 
            color: white; 
            font-weight: bold; 
            padding: 12px; 
            border-radius: 5px;
            margin-bottom: 8px;
            display: block;
        }
        
        .reason-text { font-style: italic; color: #333; background: #f0f0f0; padding: 12px; border-radius: 5px; margin-top: 10px; border-left: 4px solid var(--primary); }
        .tense-badge { display: inline-block; background: var(--primary); color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-style: normal; font-weight: bold; margin-bottom: 5px; }

        @media print {
            body { background: white; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .controls { display: none; }
            .question-card { box-shadow: none; border: 1px solid #ddd; page-break-inside: avoid; }
            #error-report { display: block !important; page-break-before: always; box-shadow: none; border: 1px solid #ccc; }
            .error-item { page-break-inside: avoid; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Master English Tenses Test</h1>
        <h3>Instructor: Muhammad Shaheer Jamal Chishti</h3>
        <p>Total Questions: 12</p>
    </div>

    <div class="example-instruction">
        Instruction: Click on the correct verb form to complete the sentence. Your answer will lock in instantly.
    </div>

    <div id="quiz-container"></div>
    
    <div class="controls">
        <button onclick="finishTest()">Finish & Generate Report (PDF)</button>
    </div>

    <div id="score-display">Final Score: <span id="final-score">0</span> / 12</div>
    <div id="error-report"></div>

    <script>
        const quizData = [
            { tense: "Present Simple", q: "1. He usually ________ to the gym on Mondays.", options: ["go", "goes", "is going", "has gone"], a: "goes" },
            { tense: "Present Continuous", q: "2. Look! The children ________ in the garden right now.", options: ["play", "plays", "are playing", "have played"], a: "are playing" },
            { tense: "Present Perfect", q: "3. I ________ my keys. I can't find them anywhere.", options: ["lose", "am losing", "have lost", "had lost"], a: "have lost" },
            { tense: "Present Perfect Continuous", q: "4. She ________ for three hours and is still not finished.", options: ["has studied", "is studying", "has been studying", "studied"], a: "has been studying" },
            { tense: "Past Simple", q: "5. We ________ a terrible movie last night.", options: ["watch", "watched", "were watching", "have watched"], a: "watched" },
            { tense: "Past Continuous", q: "6. I ________ a book when the power suddenly went out.", options: ["read", "was reading", "had read", "have read"], a: "was reading" },
            { tense: "Past Perfect", q: "7. By the time we arrived, the train ________.", options: ["left", "was leaving", "has left", "had left"], a: "had left" },
            { tense: "Past Perfect Continuous", q: "8. They ________ for over an hour before the bus finally arrived.", options: ["were waiting", "have been waiting", "had been waiting", "waited"], a: "had been waiting" },
            { tense: "Future Simple", q: "9. I promise I ________ you with your homework tomorrow.", options: ["help", "will help", "am helping", "will be helping"], a: "will help" },
            { tense: "Future Continuous", q: "10. At 8 PM tonight, we ________ dinner.", options: ["eat", "will eat", "will be eating", "will have eaten"], a: "will be eating" },
            { tense: "Future Perfect", q: "11. By next year, she ________ her university degree.", options: ["completes", "will complete", "will be completing", "will have completed"], a: "will have completed" },
            { tense: "Future Perfect Continuous", q: "12. By December, he ________ at this company for exactly five years.", options: ["works", "will work", "will have worked", "will have been working"], a: "will have been working" }
        ];

        let score = 0;
        let incorrectLog = [];
        const container = document.getElementById('quiz-container');
        const answeredQuestions = new Set();

        // Render the Quiz without showing the tense names
        quizData.forEach((item, qIndex) => {
            const qCard = document.createElement('div');
            qCard.className = 'question-card';
            qCard.id = `card-${qIndex}`;
            
            let html = `<div class="question-text">${item.q}</div>`;
            
            item.options.forEach((opt, optIndex) => {
                html += `
                    <label class="option-label" id="label-${qIndex}-${optIndex}">
                        <input type="radio" name="q${qIndex}" value="${opt}" onchange="checkAnswer(${qIndex}, '${opt}', '${item.a}', this, '${item.tense}')">
                        ${opt}
                    </label>
                `;
            });

            qCard.innerHTML = html;
            container.appendChild(qCard);
        });

        // Validation Logic
        function checkAnswer(qIndex, selectedAns, correctAns, radioInput, tense) {
            const card = document.getElementById(`card-${qIndex}`);
            
            if (card.classList.contains('locked')) return;

            answeredQuestions.add(qIndex);
            const label = radioInput.parentElement;

            if (selectedAns === correctAns) {
                label.classList.add('correct');
                score++;
            } else {
                label.classList.add('incorrect');
                
                incorrectLog.push({
                    q: quizData[qIndex].q,
                    studentAns: selectedAns,
                    correctAns: correctAns,
                    tense: tense
                });
            }

            card.classList.add('locked');
            
            const nextCard = document.getElementById(`card-${qIndex + 1}`);
            if (nextCard) {
                setTimeout(() => {
                    nextCard.scrollIntoView({ behavior: "smooth", block: "center" });
                }, 400);
            }
        }

        // Explanations for the Report Based on Tense
        function getExplanation(tenseName) {
            switch(tenseName) {
                case "Present Simple": return "Used for daily habits, facts, or routines. Structure: Subject + V1(s/es).";
                case "Present Continuous": return "Used for an action happening right now. Structure: Subject + is/am/are + V1(-ing).";
                case "Present Perfect": return "Used for an action finished recently or matters now. Structure: Subject + has/have + V3.";
                case "Present Perfect Continuous": return "Used for an action that started in the past and is still happening. Structure: Subject + has/have + been + V1(-ing).";
                case "Past Simple": return "Used for a finished action in the past. Structure: Subject + V2.";
                case "Past Continuous": return "Used for an action that was happening at a specific time in the past. Structure: Subject + was/were + V1(-ing).";
                case "Past Perfect": return "Used for an action that happened before another action in the past. Structure: Subject + had + V3.";
                case "Past Perfect Continuous": return "Used for an action that was happening for a while before something else happened in the past. Structure: Subject + had + been + V1(-ing).";
                case "Future Simple": return "Used for something that will happen in the future. Structure: Subject + will + V1.";
                case "Future Continuous": return "Used for an action that will be happening at a specific time in the future. Structure: Subject + will + be + V1(-ing).";
                case "Future Perfect": return "Used for an action that will be totally finished before a certain time in the future. Structure: Subject + will + have + V3.";
                case "Future Perfect Continuous": return "Used for an action that will have been happening for a while by a certain time in the future. Structure: Subject + will + have + been + V1(-ing).";
                default: return "Review tense structures.";
            }
        }

        // Finalize Test
        function finishTest() {
            quizData.forEach((item, index) => {
                if (!answeredQuestions.has(index)) {
                    document.getElementById(`card-${index}`).classList.add('locked');
                    incorrectLog.push({
                        q: item.q,
                        studentAns: "(Left Blank)",
                        correctAns: item.a,
                        tense: item.tense
                    });
                }
            });

            document.getElementById('score-display').style.display = 'block';
            document.getElementById('final-score').innerText = score;
            
            const reportDiv = document.getElementById('error-report');
            
            if (incorrectLog.length > 0) {
                let html = `<h2>Correction Report</h2><p>Please review the rules below for the answers you got wrong or missed.</p>`;
                
                incorrectLog.forEach((err) => {
                    html += `
                    <div class="error-item">
                        <span class="tense-badge">Tested Topic: ${err.tense}</span>
                        <p class="question-text">${err.q}</p>
                        <div class="wrong-ans">[X] Your Answer: ${err.studentAns}</div>
                        <div class="right-ans">[✓] Correct Answer: ${err.correctAns}</div>
                        <p class="reason-text"><strong>Grammar Rule:</strong> ${getExplanation(err.tense)}</p>
                    </div>`;
                });
                reportDiv.innerHTML = html;
            } else {
                reportDiv.innerHTML = `<h2 style="color:var(--correct-dark)">Perfect Score! Outstanding Job.</h2>`;
            }
            
            reportDiv.style.display = 'block';
            
            setTimeout(() => {
                window.print();
            }, 500);
        }
    </script>
</body>
</html>
