<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Tense Transformations - SJC Tech</title>
    <style>
        :root { --primary: #1f3a93; --secondary: #34495e; --correct-dark: #006400; --incorrect-dark: #8B0000; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f7; color: #333; max-width: 900px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 2px solid var(--primary); }
        .header h1 { color: var(--primary); margin-bottom: 5px; }
        .header h3 { color: var(--secondary); margin-top: 0; font-weight: normal; }
        .section-title { background-color: var(--primary); color: white; padding: 12px 15px; border-radius: 5px; margin-top: 40px; margin-bottom: 20px; }
        .question-block { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .given-text { font-weight: bold; font-size: 16px; margin-bottom: 15px; color: var(--primary); background: #e8f0fe; padding: 10px; border-radius: 5px;}
        .fix-text { color: var(--incorrect-dark); background: #fce8e6; }
        .input-group { margin-bottom: 10px; display: flex; flex-direction: column; }
        .input-label { font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #555; }
        input[type="text"] { padding: 12px; border: 2px solid #ccc; border-radius: 5px; font-size: 15px; font-weight: bold; width: 100%; box-sizing: border-box; transition: 0.3s; }
        input.correct { background-color: var(--correct-dark) !important; border-color: #004d00 !important; color: white !important; }
        input.incorrect { background-color: var(--incorrect-dark) !important; border-color: #660000 !important; color: white !important; }
        .controls { text-align: center; margin: 40px 0; }
        button { background-color: #27ae60; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #219150; }
        #score-display { font-size: 24px; font-weight: bold; text-align: center; margin-top: 30px; padding: 20px; background: #e8f8f5; border-radius: 8px; display: none; }
        #error-report { display: none; margin-top: 40px; background: white; padding: 20px; border-radius: 8px; border-top: 5px solid var(--incorrect-dark); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .error-item { border-bottom: 2px solid #eee; padding: 15px 0; }
        .wrong-ans { background-color: var(--incorrect-dark); color: white; font-weight: bold; padding: 10px; border-radius: 5px; margin-bottom: 5px; display: block; }
        .right-ans { background-color: var(--correct-dark); color: white; font-weight: bold; padding: 10px; border-radius: 5px; display: block; }
        @media print { body { background: white; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; } .controls { display: none; } .question-block { box-shadow: none; border: 1px solid #ddd; page-break-inside: avoid; } #error-report { display: block !important; page-break-before: always; box-shadow: none; border: 1px solid #ccc; } .error-item { page-break-inside: avoid; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>Sentence Transformations: Future Tense</h1>
        <h3>Instructor: Muhammad Shaheer Jamal Chishti</h3>
        <p>Type the correct sentence structure in each blank and press <strong>Enter</strong>.</p>
    </div>
    <div id="quiz-container"></div>
    <div class="controls"><button onclick="finishTest()">Finish Test & Generate PDF Report</button></div>
    <div id="score-display">Final Score: <span id="final-score">0</span> / <span id="total-blanks">0</span> blanks</div>
    <div id="error-report"></div>

    <script>
        const quizData = [
            // --- FUTURE SIMPLE (10 Questions) ---
            { section: "Future Simple", type: "transform", given: "Affirmative: She will speak English.", reqs: [ { label: "Negative", ans: "She will not speak English." }, { label: "Interrogative", ans: "Will she speak English?" } ] },
            { type: "transform", given: "Negative: He will not walk to school.", reqs: [ { label: "Affirmative", ans: "He will walk to school." }, { label: "Interrogative", ans: "Will he walk to school?" } ] },
            { type: "transform", given: "Interrogative: Will they play cricket?", reqs: [ { label: "Affirmative", ans: "They will play cricket." }, { label: "Negative", ans: "They will not play cricket." } ] },
            { type: "transform", given: "Affirmative: The sun will rise tomorrow.", reqs: [ { label: "Negative", ans: "The sun will not rise tomorrow." }, { label: "Interrogative", ans: "Will the sun rise tomorrow?" } ] },
            { type: "transform", given: "Negative: We will not eat meat.", reqs: [ { label: "Affirmative", ans: "We will eat meat." }, { label: "Interrogative", ans: "Will we eat meat?" } ] },
            { type: "fix", given: "Fix the Errors: I goes to the market tomorrow.", reqs: [ { label: "Affirmative", ans: "I will go to the market tomorrow." }, { label: "Negative", ans: "I will not go to the market tomorrow." }, { label: "Interrogative", ans: "Will I go to the market tomorrow?" } ] },
            { type: "fix", given: "Fix the Errors: Will he likes apples?", reqs: [ { label: "Affirmative", ans: "He will like apples." }, { label: "Negative", ans: "He will not like apples." }, { label: "Interrogative", ans: "Will he like apples?" } ] },
            { type: "fix", given: "Fix the Errors: They will plays chess.", reqs: [ { label: "Affirmative", ans: "They will play chess." }, { label: "Negative", ans: "They will not play chess." }, { label: "Interrogative", ans: "Will they play chess?" } ] },
            { type: "fix", given: "Fix the Errors: She will not sleeps early.", reqs: [ { label: "Affirmative", ans: "She will sleep early." }, { label: "Negative", ans: "She will not sleep early." }, { label: "Interrogative", ans: "Will she sleep early?" } ] },
            { type: "fix", given: "Fix the Errors: He fly to London next week.", reqs: [ { label: "Affirmative", ans: "He will fly to London next week." }, { label: "Negative", ans: "He will not fly to London next week." }, { label: "Interrogative", ans: "Will he fly to London next week?" } ] },

            // --- FUTURE CONTINUOUS (10 Questions) ---
            { section: "Future Continuous", type: "transform", given: "Affirmative: I will be writing a letter.", reqs: [ { label: "Negative", ans: "I will not be writing a letter." }, { label: "Interrogative", ans: "Will I be writing a letter?" } ] },
            { type: "transform", given: "Negative: She will not be crying.", reqs: [ { label: "Affirmative", ans: "She will be crying." }, { label: "Interrogative", ans: "Will she be crying?" } ] },
            { type: "transform", given: "Interrogative: Will they be running fast?", reqs: [ { label: "Affirmative", ans: "They will be running fast." }, { label: "Negative", ans: "They will not be running fast." } ] },
            { type: "transform", given: "Affirmative: The dog will be barking loudly.", reqs: [ { label: "Negative", ans: "The dog will not be barking loudly." }, { label: "Interrogative", ans: "Will the dog be barking loudly?" } ] },
            { type: "transform", given: "Negative: We will not be listening to music.", reqs: [ { label: "Affirmative", ans: "We will be listening to music." }, { label: "Interrogative", ans: "Will we be listening to music?" } ] },
            { type: "fix", given: "Fix the Errors: He will am swimming in the pool.", reqs: [ { label: "Affirmative", ans: "He will be swimming in the pool." }, { label: "Negative", ans: "He will not be swimming in the pool." }, { label: "Interrogative", "ans": "Will he be swimming in the pool?" } ] },
            { type: "fix", given: "Fix the Errors: Will she dancing on the stage?", reqs: [ { label: "Affirmative", ans: "She will be dancing on the stage." }, { label: "Negative", ans: "She will not be dancing on the stage." }, { label: "Interrogative", ans: "Will she be dancing on the stage?" } ] },
            { type: "fix", given: "Fix the Errors: I will be not joking.", reqs: [ { label: "Affirmative", ans: "I will be joking." }, { label: "Negative", ans: "I will not be joking." }, { label: "Interrogative", ans: "Will I be joking?" } ] },
            { type: "fix", given: "Fix the Errors: They will be cook dinner.", reqs: [ { label: "Affirmative", ans: "They will be cooking dinner." }, { label: "Negative", ans: "They will not be cooking dinner." }, { label: "Interrogative", ans: "Will they be cooking dinner?" } ] },
            { type: "fix", given: "Fix the Errors: The bird be flying in the sky.", reqs: [ { label: "Affirmative", ans: "The bird will be flying in the sky." }, { label: "Negative", ans: "The bird will not be flying in the sky." }, { label: "Interrogative", ans: "Will the bird be flying in the sky?" } ] },

            // --- FUTURE PERFECT (10 Questions) ---
            { section: "Future Perfect", type: "transform", given: "Affirmative: They will have bought a new car.", reqs: [ { label: "Negative", ans: "They will not have bought a new car." }, { label: "Interrogative", ans: "Will they have bought a new car?" } ] },
            { type: "transform", given: "Negative: I will not have seen that movie.", reqs: [ { label: "Affirmative", ans: "I will have seen that movie." }, { label: "Interrogative", ans: "Will I have seen that movie?" } ] },
            { type: "transform", given: "Interrogative: Will she have finished her work?", reqs: [ { label: "Affirmative", ans: "She will have finished her work." }, { label: "Negative", ans: "She will not have finished her work." } ] },
            { type: "transform", given: "Affirmative: We will have eaten breakfast.", reqs: [ { label: "Negative", ans: "We will not have eaten breakfast." }, { label: "Interrogative", ans: "Will we have eaten breakfast?" } ] },
            { type: "transform", given: "Negative: He will not have called me.", reqs: [ { label: "Affirmative", ans: "He will have called me." }, { label: "Interrogative", ans: "Will he have called me?" } ] },
            { type: "fix", given: "Fix the Errors: I will has forgotten my password.", reqs: [ { label: "Affirmative", ans: "I will have forgotten my password." }, { label: "Negative", ans: "I will not have forgotten my password." }, { label: "Interrogative", ans: "Will I have forgotten my password?" } ] },
            { type: "fix", given: "Fix the Errors: Will he have break the glass?", reqs: [ { label: "Affirmative", ans: "He will have broken the glass." }, { label: "Negative", ans: "He will not have broken the glass." }, { label: "Interrogative", ans: "Will he have broken the glass?" } ] },
            { type: "fix", given: "Fix the Errors: She will have write a poem.", reqs: [ { label: "Affirmative", ans: "She will have written a poem." }, { label: "Negative", ans: "She will not have written a poem." }, { label: "Interrogative", ans: "Will she have written a poem?" } ] },
            { type: "fix", given: "Fix the Errors: They will not has arrived yet.", reqs: [ { label: "Affirmative", ans: "They will have arrived yet." }, { label: "Negative", ans: "They will not have arrived yet." }, { label: "Interrogative", ans: "Will they have arrived yet?" } ] },
            { type: "fix", given: "Fix the Errors: We will have drank all the water.", reqs: [ { label: "Affirmative", ans: "We will have drunk all the water." }, { label: "Negative", ans: "We will not have drunk all the water." }, { label: "Interrogative", ans: "Will we have drunk all the water?" } ] },

            // --- FUTURE PERFECT CONTINUOUS (10 Questions) ---
            { section: "Future Perfect Continuous", type: "transform", given: "Affirmative: She will have been working since morning.", reqs: [ { label: "Negative", ans: "She will not have been working since morning." }, { label: "Interrogative", ans: "Will she have been working since morning?" } ] },
            { type: "transform", given: "Negative: They will not have been playing for an hour.", reqs: [ { label: "Affirmative", ans: "They will have been playing for an hour." }, { label: "Interrogative", ans: "Will they have been playing for an hour?" } ] },
            { type: "transform", given: "Interrogative: Will you have been waiting long?", reqs: [ { label: "Affirmative", ans: "You will have been waiting long." }, { label: "Negative", ans: "You will not have been waiting long." } ] },
            { type: "transform", given: "Affirmative: He will have been studying all night.", reqs: [ { label: "Negative", ans: "He will not have been studying all night." }, { label: "Interrogative", ans: "Will he have been studying all night?" } ] },
            { type: "transform", given: "Negative: It will not have been raining today.", reqs: [ { label: "Affirmative", ans: "It will have been raining today." }, { label: "Interrogative", ans: "Will it have been raining today?" } ] },
            { type: "fix", given: "Fix the Errors: I will has been reading this book.", reqs: [ { label: "Affirmative", ans: "I will have been reading this book." }, { label: "Negative", ans: "I will not have been reading this book." }, { label: "Interrogative", ans: "Will I have been reading this book?" } ] },
            { type: "fix", given: "Fix the Errors: Will she have been sleep?", reqs: [ { label: "Affirmative", ans: "She will have been sleeping." }, { label: "Negative", ans: "She will not have been sleeping." }, { label: "Interrogative", ans: "Will she have been sleeping?" } ] },
            { type: "fix", given: "Fix the Errors: They will have be running.", reqs: [ { label: "Affirmative", ans: "They will have been running." }, { label: "Negative", ans: "They will not have been running." }, { label: "Interrogative", ans: "Will they have been running?" } ] },
            { type: "fix", given: "Fix the Errors: We will not has been talking.", reqs: [ { label: "Affirmative", ans: "We will have been talking." }, { label: "Negative", ans: "We will not have been talking." }, { label: "Interrogative", ans: "Will we have been talking?" } ] },
            { type: "fix", given: "Fix the Errors: He will have been watch TV.", reqs: [ { label: "Affirmative", ans: "He will have been watching TV." }, { label: "Negative", ans: "He will not have been watching TV." }, { label: "Interrogative", ans: "Will he have been watching TV?" } ] }
        ];

        let score = 0; let totalBlanks = 0; let incorrectLog = []; const container = document.getElementById('quiz-container');
        quizData.forEach((item, qIndex) => { if (item.section) { const secTitle = document.createElement('h2'); secTitle.className = 'section-title'; secTitle.innerText = item.section; container.appendChild(secTitle); } const qBlock = document.createElement('div'); qBlock.className = 'question-block'; const textClass = item.type === "fix" ? "given-text fix-text" : "given-text"; let html = `<div class="${textClass}">${item.given}</div>`; item.reqs.forEach((req, reqIndex) => { totalBlanks++; html += `<div class="input-group"><div class="input-label">Make it ${req.label}:</div><input type="text" id="q${qIndex}_r${reqIndex}" placeholder="Type here and press Enter..." data-ans="${req.ans}" data-q="${item.given}" data-label="${req.label}"></div>`; }); qBlock.innerHTML = html; container.appendChild(qBlock); }); document.getElementById('total-blanks').innerText = totalBlanks;
        document.querySelectorAll('input[type="text"]').forEach(input => { input.addEventListener('keypress', function(e) { if (e.key === 'Enter') { if (this.disabled) return; let studentAns = this.value.trim().toLowerCase().replace(/[.?!]/g, ''); let correctAns = this.getAttribute('data-ans').toLowerCase().replace(/[.?!]/g, ''); if (studentAns === correctAns) { this.className = 'correct'; score++; } else { this.className = 'incorrect'; incorrectLog.push({ q: this.getAttribute('data-q'), label: this.getAttribute('data-label'), student: this.value.trim() || "(Blank)", correct: this.getAttribute('data-ans') }); } this.disabled = true; const inputs = Array.from(document.querySelectorAll('input[type="text"]')); const currentIndex = inputs.indexOf(this); if (currentIndex > -1 && currentIndex < inputs.length - 1) { inputs[currentIndex + 1].focus(); } } }); });
        function finishTest() { document.querySelectorAll('input[type="text"]').forEach(input => { if (!input.disabled) { input.className = 'incorrect'; input.disabled = true; incorrectLog.push({ q: input.getAttribute('data-q'), label: input.getAttribute('data-label'), student: "(Left Blank)", correct: input.getAttribute('data-ans') }); } }); document.getElementById('score-display').style.display = 'block'; document.getElementById('final-score').innerText = score; const reportDiv = document.getElementById('error-report'); if (incorrectLog.length > 0) { let html = `<h2>Correction Report</h2>`; incorrectLog.forEach(err => { html += `<div class="error-item"><p><strong>Question:</strong> ${err.q} <br> <em>(Target: ${err.label})</em></p><div class="wrong-ans">❌ Your Answer: ${err.student}</div><div class="right-ans">✅ Correct Answer: ${err.correct}</div></div>`; }); reportDiv.innerHTML = html; } else { reportDiv.innerHTML = `<h2 style="color:var(--correct-dark)">Perfect Score!</h2>`; } reportDiv.style.display = 'block'; setTimeout(() => { window.print(); }, 500); }
    </script>
</body>
</html>
